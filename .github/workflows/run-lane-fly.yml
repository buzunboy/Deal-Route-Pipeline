name: Run lane on Fly

# ONE-CLICK lane runner (manual trigger only — no cron). Pick a lane from the
# dropdown in the GitHub Actions UI and click "Run workflow"; this runs the exact
# `fly machine run ... -- <lane>` command we'd otherwise paste into a terminal,
# INSIDE the Fly org — so the production Postgres stays private (.flycast) and never
# has to be exposed to GitHub runners.
#
# This is the Fly-native counterpart to deploy/k8s/cronjobs.yaml and the
# (docker-run-against-a-public-DB) .github/workflows/scheduled.yml. Use THIS one when
# the DB is Fly-internal.
#
# Pick the API Environment (Development → dealroute-api-dev, default; Production →
# dealroute-api) and a lane from the dropdowns.
#
# SETUP (one-time):
#   1. Create a Fly token. Easiest is an org-wide token that covers BOTH apps:
#        fly tokens create org
#      (or two app-scoped deploy tokens: fly tokens create deploy -a <app>).
#   2. Add it as the repo secret FLY_API_TOKEN
#        (Settings → Secrets and variables → Actions → New repository secret).
#      If — and only if — your token is app-scoped and can't reach the other app, add
#      per-app secrets FLY_API_TOKEN_DEALROUTE_API_DEV / FLY_API_TOKEN_DEALROUTE_API;
#      each environment prefers its own, falling back to FLY_API_TOKEN.
#   Each app already holds its own DATABASE_URL / ANTHROPIC_API_KEY / S3_* as Fly
#   secrets, which the launched machine inherits — nothing else to configure here.
#
# Nothing auto-publishes; lanes are bounded. Discover (Tier-4) is included for
# completeness but stays off unless you pick it.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'API Environment'
        required: true
        default: Development
        type: choice
        # GitHub renders the raw value as the label, so the options ARE the display
        # names; the job maps Development → dealroute-api-dev, Production → dealroute-api.
        options: [Development, Production]
      lane:
        description: 'Lane to run'
        required: true
        default: crawl
        type: choice
        options: [seed-import, crawl, monitor, ingest, discover]
      image_tag:
        description: 'GHCR image tag to run'
        required: true
        default: edge
      lane_timeout:
        description: 'Max wait for the lane before stopping the attached CLI (e.g. 20m, 40m)'
        required: false
        default: 20m
      vm_memory:
        description: 'Lane machine memory in MB (Chromium needs headroom; 512 OOMs on a full crawl)'
        required: false
        default: '2048'

concurrency:
  # Never overlap a lane run with itself (no source-level advisory lock yet — see
  # docs/KNOWN_ISSUES.md). A second click waits rather than racing the first.
  # Per-environment so a dev run and a prod run don't block each other.
  group: run-lane-fly-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  run-lane:
    runs-on: ubuntu-latest
    # Comfortably above the default lane_timeout (20m) so the in-step `timeout` fires
    # first with a clean warning, rather than GitHub hard-killing the job. Raise this
    # too if you set a lane_timeout above ~45m.
    timeout-minutes: 50
    env:
      # APP + FLY_API_TOKEN are resolved per-environment in the first step below
      # (a job-level `env:` can't branch on the choice input). The rest are static.
      REGION: fra
      IMAGE: ghcr.io/buzunboy/deal-route-pipeline:${{ inputs.image_tag }}
      LANE: ${{ inputs.lane }}
      LANE_TIMEOUT: ${{ inputs.lane_timeout }}
      VM_MEMORY: ${{ inputs.vm_memory }}
      # Pass every candidate token in as env so the resolve step can pick one without
      # referencing a maybe-undefined secret inline. Per-app tokens are OPTIONAL — set
      # one only if your FLY_API_TOKEN is app-scoped and can't reach the other app.
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_API_TOKEN_DEALROUTE_API_DEV: ${{ secrets.FLY_API_TOKEN_DEALROUTE_API_DEV }}
      FLY_API_TOKEN_DEALROUTE_API: ${{ secrets.FLY_API_TOKEN_DEALROUTE_API }}
    steps:
      - name: Resolve environment → app + token
        shell: bash
        run: |
          set -euo pipefail
          # Map the API Environment choice → the Fly app name.
          case "${{ inputs.environment }}" in
            Development) APP=dealroute-api-dev ;;
            Production)  APP=dealroute-api ;;
            *) echo "::error::unknown environment '${{ inputs.environment }}'"; exit 1 ;;
          esac

          # Pick the token: a per-app FLY_API_TOKEN_<APP> (set only when your token is
          # app-scoped) wins; otherwise fall back to the shared FLY_API_TOKEN. So an
          # org-wide token Just Works, and a dev-scoped token can be added later with
          # no edit here.
          case "$APP" in
            dealroute-api-dev) TOKEN="${FLY_API_TOKEN_DEALROUTE_API_DEV:-$FLY_API_TOKEN}" ;;
            dealroute-api)     TOKEN="${FLY_API_TOKEN_DEALROUTE_API:-$FLY_API_TOKEN}" ;;
          esac

          if [ -z "$TOKEN" ]; then
            echo "::error::No Fly token available for '$APP'. Add a repo secret FLY_API_TOKEN"
            echo "::error::(org-wide, covers both apps) — or a per-app FLY_API_TOKEN_${APP^^} with"
            echo "::error::dashes as underscores. Create one with: fly tokens create deploy -a $APP"
            exit 1
          fi

          echo "Targeting Fly app: $APP"
          echo "APP=$APP" >> "$GITHUB_ENV"
          # Mask before exporting so it never lands in a log.
          echo "::add-mask::$TOKEN"
          echo "FLY_API_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Resolve the lane command
        id: cmd
        shell: bash
        run: |
          set -euo pipefail
          # Map the chosen lane → its CLI args + whether it needs the real LLM.
          # seed-import doesn't call the LLM; the others do (override LLM_PROVIDER).
          case "$LANE" in
            seed-import) ARGS="seed-import";          NEEDS_LLM=0 ;;
            crawl)       ARGS="crawl --due";           NEEDS_LLM=1 ;;
            monitor)     ARGS="monitor --due";         NEEDS_LLM=1 ;;
            ingest)      ARGS="ingest --community-due"; NEEDS_LLM=1 ;;
            discover)    ARGS="discover --broad";       NEEDS_LLM=1 ;;
            *) echo "::error::unknown lane '$LANE'"; exit 1 ;;
          esac
          echo "args=$ARGS"        >> "$GITHUB_OUTPUT"
          echo "needs_llm=$NEEDS_LLM" >> "$GITHUB_OUTPUT"

      - name: Run the lane (fly machine run, ephemeral, in the Fly org)
        shell: bash
        run: |
          set -euo pipefail
          # Build the -e overrides. The app's secrets (DATABASE_URL, ANTHROPIC_API_KEY,
          # S3_*) are inherited automatically; we only override the lane-specific env:
          #   - LLM_PROVIDER=anthropic for lanes that call the model (the app runs `stub`),
          #   - RUN_MIGRATIONS=false (the schema is already applied by the live API),
          #   - discover also needs AGENT=search + SEARCH_PROVIDER (kept off otherwise).
          EXTRA_ENV=(-e RUN_MIGRATIONS=false)
          if [ "${{ steps.cmd.outputs.needs_llm }}" = "1" ]; then
            EXTRA_ENV+=(-e LLM_PROVIDER=anthropic)
          fi
          if [ "$LANE" = "discover" ]; then
            EXTRA_ENV+=(-e AGENT=search -e SEARCH_PROVIDER=api)
          fi

          echo "Running '$LANE' → flyctl machine run $IMAGE -- ${{ steps.cmd.outputs.args }}"
          # Use `flyctl` (the canonical binary the setup action installs — `fly` is not
          # guaranteed on PATH in the run step). `--rm` self-deletes the machine on exit.
          # The `--` separates flyctl's flags from the container command (without it,
          # flyctl parses `--due` as its own flag).
          #
          # Stay ATTACHED so the lane's streamed logs AND its exit code surface in this
          # step — but bound it with `timeout`, because `flyctl machine run` (without
          # --detach) keeps monitoring and may not exit cleanly after the one-off
          # command finishes, hanging the step. The lane's own work is bounded (per-run
          # caps), so LANE_TIMEOUT is a generous backstop, not the expected duration.
          LANE_TIMEOUT="${LANE_TIMEOUT:-20m}"
          set +e
          # --org is REQUIRED in CI: with an org-spanning token flyctl prompts to pick
          # an org, which dies with "prompt: non interactive" under no TTY. Both apps
          # live in the `personal` org. `< /dev/null` is a belt-and-braces guard so any
          # other stray prompt fails fast instead of hanging.
          timeout "$LANE_TIMEOUT" flyctl machine run "$IMAGE" \
            -a "$APP" --org personal --region "$REGION" --rm \
            --vm-memory "$VM_MEMORY" \
            "${EXTRA_ENV[@]}" \
            -- ${{ steps.cmd.outputs.args }} < /dev/null
          rc=$?
          set -e
          if [ "$rc" -eq 124 ]; then
            # 124 = `timeout` killed it. The lane likely FINISHED (it self-deletes on
            # exit) but flyctl stayed attached past the wait. Don't fail the run on this;
            # verify via the API / `flyctl logs`. A genuinely stuck lane shows up there.
            echo "::warning::flyctl stayed attached past ${LANE_TIMEOUT} and was stopped (exit 124)."
            echo "::warning::The lane usually completed — confirm with: curl https://${APP}.fly.dev/api/candidates"
            exit 0
          fi
          # Any other non-zero is a real lane/launch failure — propagate it.
          exit "$rc"
