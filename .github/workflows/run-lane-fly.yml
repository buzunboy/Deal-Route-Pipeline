name: Run lane on Fly

# ONE-CLICK lane runner (manual trigger only — no cron). Pick a lane from the
# dropdown in the GitHub Actions UI and click "Run workflow"; this runs the exact
# `fly machine run ... -- <lane>` command we'd otherwise paste into a terminal,
# INSIDE the Fly org — so the production Postgres stays private (.flycast) and never
# has to be exposed to GitHub runners.
#
# This is the Fly-native counterpart to deploy/k8s/cronjobs.yaml and the
# (docker-run-against-a-public-DB) .github/workflows/scheduled.yml. Use THIS one when
# the DB is Fly-internal.
#
# SETUP (one-time):
#   1. Create a Fly deploy token scoped to the app:
#        fly tokens create deploy -a dealroute-api
#   2. Add it as a repo secret named FLY_API_TOKEN
#        (Settings → Secrets and variables → Actions → New repository secret).
#   The app already holds DATABASE_URL / ANTHROPIC_API_KEY / S3_* as Fly secrets,
#   which the launched machine inherits — nothing else to configure here.
#
# Nothing auto-publishes; lanes are bounded. Discover (Tier-4) is included for
# completeness but stays off unless you pick it.

on:
  workflow_dispatch:
    inputs:
      lane:
        description: 'Lane to run'
        required: true
        default: crawl
        type: choice
        options: [seed-import, crawl, monitor, ingest, discover]
      image_tag:
        description: 'GHCR image tag to run'
        required: true
        default: edge
      lane_timeout:
        description: 'Max wait for the lane before stopping the attached CLI (e.g. 20m, 40m)'
        required: false
        default: 20m

concurrency:
  # Never overlap a lane run with itself (no source-level advisory lock yet — see
  # docs/KNOWN_ISSUES.md). A second click waits rather than racing the first.
  group: run-lane-fly
  cancel-in-progress: false

jobs:
  run-lane:
    runs-on: ubuntu-latest
    # Comfortably above the default lane_timeout (20m) so the in-step `timeout` fires
    # first with a clean warning, rather than GitHub hard-killing the job. Raise this
    # too if you set a lane_timeout above ~45m.
    timeout-minutes: 50
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      APP: dealroute-api
      REGION: fra
      IMAGE: ghcr.io/buzunboy/deal-route-pipeline:${{ inputs.image_tag }}
      LANE: ${{ inputs.lane }}
      LANE_TIMEOUT: ${{ inputs.lane_timeout }}
    steps:
      - name: Guard — require the Fly token
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::FLY_API_TOKEN secret is not set. Create one with"
            echo "::error::  fly tokens create deploy -a dealroute-api"
            echo "::error::and add it as the repo secret FLY_API_TOKEN (see this workflow's header)."
            exit 1
          fi

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Resolve the lane command
        id: cmd
        shell: bash
        run: |
          set -euo pipefail
          # Map the chosen lane → its CLI args + whether it needs the real LLM.
          # seed-import doesn't call the LLM; the others do (override LLM_PROVIDER).
          case "$LANE" in
            seed-import) ARGS="seed-import";          NEEDS_LLM=0 ;;
            crawl)       ARGS="crawl --due";           NEEDS_LLM=1 ;;
            monitor)     ARGS="monitor --due";         NEEDS_LLM=1 ;;
            ingest)      ARGS="ingest --community-due"; NEEDS_LLM=1 ;;
            discover)    ARGS="discover --broad";       NEEDS_LLM=1 ;;
            *) echo "::error::unknown lane '$LANE'"; exit 1 ;;
          esac
          echo "args=$ARGS"        >> "$GITHUB_OUTPUT"
          echo "needs_llm=$NEEDS_LLM" >> "$GITHUB_OUTPUT"

      - name: Run the lane (fly machine run, ephemeral, in the Fly org)
        shell: bash
        run: |
          set -euo pipefail
          # Build the -e overrides. The app's secrets (DATABASE_URL, ANTHROPIC_API_KEY,
          # S3_*) are inherited automatically; we only override the lane-specific env:
          #   - LLM_PROVIDER=anthropic for lanes that call the model (the app runs `stub`),
          #   - RUN_MIGRATIONS=false (the schema is already applied by the live API),
          #   - discover also needs AGENT=search + SEARCH_PROVIDER (kept off otherwise).
          EXTRA_ENV=(-e RUN_MIGRATIONS=false)
          if [ "${{ steps.cmd.outputs.needs_llm }}" = "1" ]; then
            EXTRA_ENV+=(-e LLM_PROVIDER=anthropic)
          fi
          if [ "$LANE" = "discover" ]; then
            EXTRA_ENV+=(-e AGENT=search -e SEARCH_PROVIDER=api)
          fi

          echo "Running '$LANE' → flyctl machine run $IMAGE -- ${{ steps.cmd.outputs.args }}"
          # Use `flyctl` (the canonical binary the setup action installs — `fly` is not
          # guaranteed on PATH in the run step). `--rm` self-deletes the machine on exit.
          # The `--` separates flyctl's flags from the container command (without it,
          # flyctl parses `--due` as its own flag).
          #
          # Stay ATTACHED so the lane's streamed logs AND its exit code surface in this
          # step — but bound it with `timeout`, because `flyctl machine run` (without
          # --detach) keeps monitoring and may not exit cleanly after the one-off
          # command finishes, hanging the step. The lane's own work is bounded (per-run
          # caps), so LANE_TIMEOUT is a generous backstop, not the expected duration.
          LANE_TIMEOUT="${LANE_TIMEOUT:-20m}"
          set +e
          timeout "$LANE_TIMEOUT" flyctl machine run "$IMAGE" \
            -a "$APP" --region "$REGION" --rm \
            "${EXTRA_ENV[@]}" \
            -- ${{ steps.cmd.outputs.args }}
          rc=$?
          set -e
          if [ "$rc" -eq 124 ]; then
            # 124 = `timeout` killed it. The lane likely FINISHED (it self-deletes on
            # exit) but flyctl stayed attached past the wait. Don't fail the run on this;
            # verify via the API / `flyctl logs`. A genuinely stuck lane shows up there.
            echo "::warning::flyctl stayed attached past ${LANE_TIMEOUT} and was stopped (exit 124)."
            echo "::warning::The lane usually completed — confirm with: curl https://dealroute-api.fly.dev/api/candidates"
            exit 0
          fi
          # Any other non-zero is a real lane/launch failure — propagate it.
          exit "$rc"
