name: CI

# Runs on PRs and on pushes to the default branch (master). NB: the trigger was
# previously `main`, which never matched this repo's `master` default — so pushes
# to master ran no CI. Fixed.
on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Exercise the documented minimum (Node 20, the deploy target) plus 22.
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      # The HTTP contract: OpenAPI must lint, and the committed Postman collection must
      # be structurally in sync with the spec (a new/renamed/removed endpoint that
      # wasn't regenerated fails here). See scripts/postman-check.mjs.
      - run: npm run api:check
      - run: npm test
      - run: npm run build

  # Hermetic integration tests: real composition root + real Postgres, no network.
  # Runs only after the fast unit `check` passes, so a unit break fails fast without
  # spinning up Postgres. Migrations are applied as an explicit gate before the suite
  # (the suite's harness also applies them idempotently — this makes the gate visible
  # and fails loudly on a bad migration rather than mid-test).
  integration:
    needs: check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dealroute
          POSTGRES_PASSWORD: dealroute
          POSTGRES_DB: dealroute_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dealroute"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL_TEST: postgres://dealroute:dealroute@localhost:5432/dealroute_test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Explicit migrate gate against the test DB (the same DB the suite uses).
      - name: Apply migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgres://dealroute:dealroute@localhost:5432/dealroute_test
      - run: npm run test:integration
