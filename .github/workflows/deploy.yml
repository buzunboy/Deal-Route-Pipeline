name: Deploy API to Fly

# Deploys the always-on `serve` API (gated /api/* for the admin panel + public
# /v1/* feed) to Fly.io by running `flyctl deploy -c deploy/fly/fly.toml` with a
# prebuilt GHCR image tag. This is the deploy counterpart to run-lane-fly.yml
# (which runs the short-lived cron lanes) — same app, same FLY_API_TOKEN secret.
#
# It does NOT build: release.yml already built + pushed the image to GHCR
# (ghcr.io/buzunboy/deal-route-pipeline:edge + :sha-<short>). This workflow only
# points the live app at the chosen tag and triggers a rolling deploy. The image
# entrypoint applies DB migrations before `serve` starts, so a deploy also runs
# any pending migrations.
#
# MANUAL ONLY — pick the image tag and click "Run workflow". Nothing auto-deploys
# on merge; you ship when you want to.
#
# SETUP (one-time):
#   1. Create a Fly deploy token scoped to the app (same token run-lane-fly uses):
#        fly tokens create deploy -a dealroute-api
#   2. Add it as the repo secret FLY_API_TOKEN
#        (Settings → Secrets and variables → Actions → New repository secret).
#   The app already holds DATABASE_URL / REVIEW_API_TOKEN / S3_* / CORS as Fly
#   secrets (see deploy/fly/README.md §4.2) — those are NOT set here.
#   The GHCR package must be pullable by Fly: make it public, or configure a pull
#   secret on the app (deploy/fly/README.md §3).

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'GHCR image tag to deploy (e.g. edge, sha-abc1234, v1.2.3)'
        required: true
        default: edge

permissions:
  contents: read

concurrency:
  # Never overlap two deploys of the same app — a second click waits for the first.
  group: deploy-fly
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Gate behind the `production` Environment so a human can be required to approve
    # (configure required reviewers on the Environment in repo Settings → Environments).
    environment: production
    timeout-minutes: 20
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      APP: dealroute-api
      IMAGE: ghcr.io/buzunboy/deal-route-pipeline:${{ inputs.image_tag }}
    steps:
      - name: Guard — require the Fly token
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::FLY_API_TOKEN secret is not set. Create one with"
            echo "::error::  fly tokens create deploy -a dealroute-api"
            echo "::error::and add it as the repo secret FLY_API_TOKEN (see this workflow's header)."
            exit 1
          fi

      - uses: actions/checkout@v5

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        shell: bash
        run: |
          set -euo pipefail
          echo "Deploying $IMAGE to app '$APP' via deploy/fly/fly.toml"
          # --image overrides the tag in fly.toml so we ship exactly the chosen,
          # already-built artifact (no rebuild). The entrypoint migrates the DB,
          # then starts `serve`. fly.toml keeps min_machines_running=1 so the
          # rolling deploy hands over without a cold start for the panel.
          flyctl deploy \
            -c deploy/fly/fly.toml \
            -a "$APP" \
            --image "$IMAGE"

      - name: Show status
        if: always()
        run: flyctl status -a "$APP" || true
