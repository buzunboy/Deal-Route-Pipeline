openapi: 3.1.0
info:
  title: DealRoute Pipeline API
  version: 1.0.0
  description: |
    HTTP surface of the DealRoute data-pipeline service, served by the `serve` CLI
    command on a single port (`REVIEW_API_PORT`, default 3000). Two routers share
    the port via **total prefix dispatch**:

      * **Public read feed** — `/v1/*`: unauthenticated, READ-ONLY over `published`
        deals. Returns a curated DTO that NEVER leaks an internal field.
      * **Gated admin API** — `/api/*`: the review/approval surface consumed by the
        admin panel. Writes (POST/PATCH) require a Bearer token; reads are open.
      * **Test page** — `/`: a thin built-in HTML harness over the `/api/*` endpoints.

    Trust invariants (see CLAUDE.md): the LLM only proposes candidates; **nothing
    auto-publishes** — a deal becomes `published` ONLY via `POST /api/candidates/:id/approve`
    by a human approver. Every `:id` is a UUID.

    ⚠️ SOURCE-OF-TRUTH: this file is the contract. When an endpoint, query param,
    request body, or response shape changes, THIS spec must change in the same commit
    (see `.claude/rules/api-and-openapi.md`). Keep `docs/api/dealroute.postman_collection.json`
    in step.
  license:
    name: UNLICENSED (private)
servers:
  - url: https://dealroute-api.fly.dev
    description: Production (Fly.io, region fra) — deployed 2026-06-22
  - url: http://localhost:3000
    description: Local dev (npm run cli -- serve)

tags:
  - name: Public feed
    description: Unauthenticated read-only `/v1/*` surface (landing page / public consumers).
  - name: Health
    description: Liveness probes.
  - name: Candidates
    description: Review queue — list, edit, approve, reject, audit. (admin)
  - name: Field proposals
    description: LLM-proposed novel condition keys awaiting promotion. (admin)
  - name: Manual capture
    description: Human-driven evidence capture tasks. (admin)
  - name: Sources
    description: Source-promotion loop — approve/reject proposed crawl sources. (admin)
  - name: Audit
    description: Cross-deal audit feed of recent review decisions. (admin)
  - name: Published
    description: Admin published-deals screen — publication history. (admin)
  - name: Team
    description: Reviewer registry + profile (the pipeline is the identity system of record). (admin)
  - name: Test page
    description: Built-in HTML review harness.

security: []

paths:
  # ───────────────────────────── PUBLIC /v1 ─────────────────────────────────
  /v1/health:
    get:
      tags: [Health]
      summary: Public feed liveness
      operationId: getPublicHealth
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }

  /v1/deals:
    get:
      tags: [Public feed]
      summary: List published deals (filtered, sorted, paginated)
      operationId: listPublishedDeals
      description: |
        Returns only `published` deals as the curated `PublicDeal` DTO. Sort is
        reliability-blended (the raw reliability score is never exposed): the primary
        key decides order, ties break by source reliability then id.
      security: []
      parameters:
        - name: service
          in: query
          description: Exact service name match (case-sensitive), e.g. `Disney+`.
          schema: { type: string, minLength: 1 }
        - name: country
          in: query
          description: ISO country (market-driven; DE for v1).
          schema: { $ref: '#/components/schemas/Country' }
        - name: route_type
          in: query
          schema: { $ref: '#/components/schemas/RouteType' }
        - name: price_max
          in: query
          description: Max true monthly cost (EUR), inclusive.
          schema: { type: number, minimum: 0 }
        - name: sort
          in: query
          schema:
            $ref: '#/components/schemas/PublishedSort'
          description: Default `cost_asc`.
        - name: limit
          in: query
          description: Page size. Default 20, hard-capped at 100.
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, maximum: 10000, default: 0 }
      responses:
        '200':
          description: A page of published deals.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicDealPage' }
        '400':
          description: Unknown query param, bad enum, non-numeric or over-cap value.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/deals/{id}:
    get:
      tags: [Public feed]
      summary: Get one published deal
      operationId: getPublishedDeal
      security: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: The deal (curated DTO).
          content:
            application/json:
              schema:
                type: object
                required: [deal]
                properties:
                  deal: { $ref: '#/components/schemas/PublicDeal' }
        '404':
          description: Missing OR not published (the two are indistinguishable by design).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ───────────────────────────── ADMIN /api ─────────────────────────────────
  /api/health:
    get:
      tags: [Health]
      summary: Admin API liveness
      operationId: getAdminHealth
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }

  /api/candidates:
    get:
      tags: [Candidates]
      summary: List candidates awaiting review (filtered, paginated)
      operationId: listCandidates
      description: |
        Lowest-confidence first. Defaults to the reviewable pair (`candidate` +
        `in_review`) when `status` is omitted. Read endpoint — not gated. Each item's
        `evidence` carries resolved `evidence_screenshot_url` / `evidence_html_url`
        when a CDN base is configured (ACR-13).
      security: []
      parameters:
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/DealStatus' }
        - name: service
          in: query
          schema: { type: string, minLength: 1 }
        - name: confidence_max
          in: query
          description: Inclusive upper bound on the stored confidence (0–1).
          schema: { type: number, minimum: 0, maximum: 1 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, maximum: 100000, default: 0 }
      responses:
        '200':
          description: Candidates, each joined with its evidence bundle.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CandidateView' }
        '400':
          description: Invalid filter / out-of-range pagination.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/candidates/counts:
    get:
      tags: [Candidates]
      summary: Aggregate review-queue counts for the view-cards + filter rail (ACR-5)
      operationId: getCandidateCounts
      description: |
        One call returns the queue's headline counts: `all_pending` (reviewable
        deals), `low_confidence` (confidence ≤ 0.5), `human_edited`, a per-route
        breakdown, and `rejected_today` (rejections on the current UTC day, from the
        reviews audit log — a true date-bounded count). Read endpoint — not gated.
      security: []
      responses:
        '200':
          description: The aggregate counts.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CandidateCounts' }

  /api/candidates/{id}:
    patch:
      tags: [Candidates]
      summary: Edit a candidate's reviewer-correctable fields (before approve)
      operationId: editCandidate
      description: |
        Applies an allowlisted patch via the pure `applyCandidatePatch`. Re-validates,
        tags every changed field path into the deal's `human_edited`, keeps the model
        grounding quotes, and re-derives `true_cost_monthly` on a price change. Status
        stays `candidate`. Identity / provenance / status are never editable.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EditCandidateBody' }
      responses:
        '200': { $ref: '#/components/responses/DealEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '413': { $ref: '#/components/responses/TooLarge' }

  /api/candidates/{id}/approve:
    post:
      tags: [Candidates]
      summary: Approve a candidate → publish it
      operationId: approveCandidate
      description: |
        The ONLY path that sets a deal `published`. The reviewer may set the EU-Omnibus
        affiliate disclosure here; omitted ⇒ defaults to true (over-disclose) and flags it.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApproveCandidateBody' }
      responses:
        '200': { $ref: '#/components/responses/DealEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '413': { $ref: '#/components/responses/TooLarge' }

  /api/candidates/{id}/reject:
    post:
      tags: [Candidates]
      summary: Reject a candidate
      operationId: rejectCandidate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RejectBody' }
      responses:
        '200': { $ref: '#/components/responses/DealEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '413': { $ref: '#/components/responses/TooLarge' }

  /api/candidates/{id}/reviews:
    get:
      tags: [Candidates]
      summary: Audit history for a candidate
      operationId: listCandidateReviews
      security: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Immutable review/audit log (who decided what, when, why).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ReviewRecord' }

  /api/audit:
    get:
      tags: [Audit]
      summary: Cross-deal audit feed of recent review decisions (ACR-7)
      operationId: getAuditFeed
      description: |
        Recent human review decisions across all deals, newest first — backs the
        Dashboard "recent activity" card and the Audit-log screen. Only the persisted
        review actions appear (`approve` · `reject` · `edit`); `promote`/`extract` are
        not yet recorded as audit rows (deferred). Read endpoint — not gated.
      security: []
      parameters:
        - name: actor
          in: query
          description: Filter to one reviewer identity (approver).
          schema: { type: string, minLength: 1 }
        - name: entity_id
          in: query
          description: Filter to one entity (deal id).
          schema: { type: string, format: uuid }
        - name: since
          in: query
          description: Only decisions at/after this ISO-8601 instant.
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        '200':
          description: The recent-activity entries (newest first).
          content:
            application/json:
              schema:
                type: object
                required: [entries]
                properties:
                  entries:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEntry' }
                additionalProperties: false
        '400':
          description: Out-of-range limit or an unparseable `since`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/published:
    get:
      tags: [Published]
      summary: Admin "Published deals" screen — publication history (ACR-10)
      operationId: listAdminPublished
      description: |
        Live (`published`) + unpublished (`expired`) deals — publication HISTORY, not
        just the live feed — newest-published-first, paginated. Curated admin row
        (not the public allow-list, but not the whole record either). Read — not gated.
      security: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, maximum: 100000, default: 0 }
      responses:
        '200':
          description: Published-screen rows + total.
          content:
            application/json:
              schema:
                type: object
                required: [deals, total]
                properties:
                  deals:
                    type: array
                    items: { $ref: '#/components/schemas/AdminPublishedDeal' }
                  total: { type: integer, minimum: 0 }
                additionalProperties: false
        '400':
          description: Out-of-range pagination.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/field-proposals:
    get:
      tags: [Field proposals]
      summary: List LLM field proposals (novel condition keys)
      operationId: listFieldProposals
      security: []
      responses:
        '200':
          description: Field proposals awaiting promotion.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FieldProposalRecord' }

  /api/field-proposals/{key}/promote:
    post:
      tags: [Field proposals]
      summary: Promote a field proposal into the condition vocabulary
      operationId: promoteFieldProposal
      description: |
        Adds a `condition_vocabulary` row with the suggested key as an alias and marks
        the proposal `promoted`. `target:"field"` (promote to a first-class column) is
        not supported and returns 400.
      security:
        - bearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          description: The proposal's suggested key (URL-encoded).
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PromoteBody' }
      responses:
        '200':
          description: The created vocabulary entry.
          content:
            application/json:
              schema:
                type: object
                required: [vocabulary_entry]
                properties:
                  vocabulary_entry: { $ref: '#/components/schemas/ConditionVocabularyEntry' }
        '400':
          description: Validation failed, or `target:"field"` (not supported).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '413': { $ref: '#/components/responses/TooLarge' }

  /api/manual-capture-tasks:
    get:
      tags: [Manual capture]
      summary: List open manual-capture tasks
      operationId: listManualCaptureTasks
      security: []
      responses:
        '200':
          description: Manual-capture tasks.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ManualCaptureTask' }
    post:
      tags: [Manual capture]
      summary: Create a candidate from an ad-hoc manual capture (no backing task, ACR-12)
      operationId: createManualCapture
      description: |
        For a deal a reviewer captures from scratch — NOT a crawler "couldn't read"
        task. Mints a `done` `ad_hoc` capture task AND an evidence-backed `candidate`
        in one call. Same trust contract as `/{id}/complete`: evidence REQUIRED (by
        reference), source_url pinned from the evidence, whole record `human_edited`,
        never auto-published. Distinct from `/{id}/complete`, which needs a task id.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CompleteManualBody' }
      responses:
        '201':
          description: Candidate created.
          content:
            application/json:
              schema:
                type: object
                required: [created, candidate_id]
                properties:
                  created: { type: boolean }
                  candidate_id: { type: string, format: uuid }
                additionalProperties: false
        '400':
          description: Missing approver/fields, or incomplete evidence bundle.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '413': { $ref: '#/components/responses/TooLarge' }

  /api/manual-capture-tasks/{id}/complete:
    post:
      tags: [Manual capture]
      summary: Complete a manual-capture task → mint an evidence-backed candidate
      operationId: completeManualCaptureTask
      description: |
        Evidence is REQUIRED and supplied by reference (the human uploads artifacts
        out-of-band and passes the store keys + inline terms text). Mints a `candidate`,
        marks the whole record `human_edited`, and NEVER auto-publishes.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CompleteManualBody' }
      responses:
        '200': { $ref: '#/components/responses/DealEnvelope' }
        '400':
          description: Missing approver/fields, or incomplete evidence bundle.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '413': { $ref: '#/components/responses/TooLarge' }

  /api/sources:
    get:
      tags: [Sources]
      summary: Sources registry — operational sources (active + disabled), ACR-10
      operationId: listSourceRegistry
      description: |
        The operational source list (NOT the pending-promotion queue). Curated rows:
        domain, capitalised kind, tier, cadence, reliability, last_seen, and a panel
        status (`active` · `degraded` for a flaky active source · `disabled`). Read.
      security: []
      responses:
        '200':
          description: The sources registry.
          content:
            application/json:
              schema:
                type: object
                required: [sources]
                properties:
                  sources:
                    type: array
                    items: { $ref: '#/components/schemas/SourceRegistryEntry' }
                additionalProperties: false
    post:
      tags: [Sources]
      summary: Register a new operational source (the "+ Add source" flow, ACR-10)
      operationId: createSource
      description: |
        Builds an `active` source from the panel fields, pinning its registrable
        domain via the PSL. Idempotent on URL (re-adding a domain updates in place).
        `country` defaults to the active market (DE v1). Bearer-gated.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [approver, domain, kind, tier]
              properties:
                approver: { type: string, minLength: 1 }
                domain:
                  type: string
                  minLength: 1
                  description: Bare domain (netflix.com) or full URL.
                kind:
                  type: string
                  description: provider | bundler | community | discovered | aggregator (case-insensitive).
                tier: { type: integer, enum: [1, 2, 3, 4] }
                country: { type: string, description: In-scope market; defaults to DE. }
                cadence_days: { type: integer, minimum: 1 }
              additionalProperties: false
      responses:
        '201':
          description: Source registered.
          content:
            application/json:
              schema:
                type: object
                required: [id, created]
                properties:
                  id: { type: string, format: uuid }
                  created: { type: boolean }
                additionalProperties: false
        '400':
          description: Missing/invalid approver, domain, kind, tier, or country.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '413': { $ref: '#/components/responses/TooLarge' }

  /api/sources/pending:
    get:
      tags: [Sources]
      summary: List proposed sources awaiting approval
      operationId: listPendingSources
      security: []
      responses:
        '200':
          description: Pending sources.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Source' }

  /api/sources/{id}/approve:
    post:
      tags: [Sources]
      summary: Approve a proposed source
      operationId: approveSource
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApproverBody' }
      responses:
        '200': { $ref: '#/components/responses/SourceEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '413': { $ref: '#/components/responses/TooLarge' }

  /api/sources/{id}/reject:
    post:
      tags: [Sources]
      summary: Reject a proposed source
      operationId: rejectSource
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RejectBody' }
      responses:
        '200': { $ref: '#/components/responses/SourceEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '413': { $ref: '#/components/responses/TooLarge' }

  /api/sources/{id}/reviews:
    get:
      tags: [Sources]
      summary: Audit history for a source
      operationId: listSourceReviews
      security: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Source review/audit log.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SourceReviewRecord' }

  /api/team:
    get:
      tags: [Team]
      summary: List team members with derived review counts (ACR-10)
      operationId: listTeam
      description: |
        Reviewer registry — the pipeline is the system of record for reviewer
        identity. Each member's `review_count` is DERIVED from the reviews audit log
        (by email = approver), so it never drifts. Read — not gated.
      security: []
      responses:
        '200':
          description: Team members.
          content:
            application/json:
              schema:
                type: object
                required: [members]
                properties:
                  members:
                    type: array
                    items: { $ref: '#/components/schemas/TeamMemberView' }
                additionalProperties: false
    post:
      tags: [Team]
      summary: Invite / register a team member (ACR-10)
      operationId: inviteTeamMember
      description: Idempotent on email (re-inviting updates name/role). Bearer-gated.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [approver, name, email]
              properties:
                approver: { type: string, minLength: 1 }
                name: { type: string, minLength: 1 }
                email: { type: string, format: email }
                role: { type: string, enum: [admin, reviewer] }
              additionalProperties: false
      responses:
        '201':
          description: Member invited/registered.
          content:
            application/json:
              schema:
                type: object
                required: [id, invited, email]
                properties:
                  id: { type: string, format: uuid }
                  invited: { type: boolean }
                  email: { type: string }
                additionalProperties: false
        '400':
          description: Missing/invalid approver, name, email, or role.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '413': { $ref: '#/components/responses/TooLarge' }

  /api/profile:
    patch:
      tags: [Team]
      summary: Update the signed-in reviewer's own display name (ACR-11)
      operationId: updateProfile
      description: |
        Keyed by the approver's email identity (only the editable name is mutable —
        email is the auth identity; role/status are admin actions). Bearer-gated.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [approver, name]
              properties:
                approver: { type: string, minLength: 1 }
                name: { type: string, minLength: 1 }
              additionalProperties: false
      responses:
        '200':
          description: Profile updated.
          content:
            application/json:
              schema:
                type: object
                required: [updated, name]
                properties:
                  updated: { type: boolean }
                  name: { type: string }
                additionalProperties: false
        '400':
          description: Missing approver/name, or no member for this approver.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '413': { $ref: '#/components/responses/TooLarge' }

  # ───────────────────────────── TEST PAGE ──────────────────────────────────
  /:
    get:
      tags: [Test page]
      summary: Built-in HTML review harness
      operationId: getTestPage
      security: []
      responses:
        '200':
          description: The review test page (thin UI over `/api/*`).
          content:
            text/html:
              schema: { type: string }
        '404':
          description: No static page configured.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        `Authorization: Bearer <REVIEW_API_TOKEN>` on every state-changing (POST/PATCH)
        endpoint. When no token is configured server-side the API is open and MUST be
        bound to a trusted network. Read endpoints are never gated.

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: Resource UUID. A non-UUID currently yields 500 (see docs/KNOWN_ISSUES.md).
      schema: { type: string, format: uuid }

  responses:
    DealEnvelope:
      description: The affected deal.
      content:
        application/json:
          schema:
            type: object
            required: [deal]
            properties:
              deal: { $ref: '#/components/schemas/DealRecord' }
    SourceEnvelope:
      description: The affected source.
      content:
        application/json:
          schema:
            type: object
            required: [source]
            properties:
              source: { $ref: '#/components/schemas/Source' }
    BadRequest:
      description: Malformed JSON body or failed validation.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Missing or wrong Bearer token.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Resource is not in a state that allows this action (e.g. not reviewable).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    TooLarge:
      description: Request body exceeds the 64 KiB cap.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Health:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean, const: true }

    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }

    # ── Enums (mirror src/domain/deal-record/enums.ts + published-query.ts) ──
    RouteType:
      type: string
      enum: [bundle, standalone, promo, regional]
    Billing:
      type: string
      enum: [monthly, annual, one_time, prepaid, unknown]
    DealStatus:
      type: string
      enum: [candidate, in_review, published, expired, rejected]
    Country:
      type: string
      description: Market-driven (src/domain/markets/markets.ts). DE for v1.
      enum: [DE]
    Currency:
      type: string
      description: Market-driven. EUR for v1.
      enum: [EUR]
    Price:
      type: object
      description: A deal price (src/domain/deal-record/price.ts).
      required: [amount, currency, billing]
      properties:
        amount: { type: number, minimum: 0 }
        currency: { $ref: '#/components/schemas/Currency' }
        billing: { $ref: '#/components/schemas/Billing' }
        prepaid_months:
          type: integer
          minimum: 1
          description: 'For `billing: prepaid` only — months the up-front `amount` covers.'
    Condition:
      type: object
      description: A long-tail eligibility/validity condition mapped to the vocabulary.
      required: [key, label]
      properties:
        key: { type: string, minLength: 1 }
        label: { type: string, minLength: 1 }
        value:
          type: [object, 'null']
          additionalProperties: true
        source_quote: { type: string }
    Eligibility:
      type: object
      description: Eligibility core flags + long-tail conditions (src/domain/deal-record/eligibility.ts).
      required: [new_customer_only, residency_kyc, plan_tier_required, min_spend, stackable]
      properties:
        new_customer_only: { type: [boolean, 'null'] }
        residency_kyc: { type: [boolean, 'null'] }
        plan_tier_required: { type: [string, 'null'] }
        min_spend: { type: [number, 'null'], minimum: 0 }
        stackable: { type: [boolean, 'null'] }
        conditions:
          type: array
          items: { $ref: '#/components/schemas/Condition' }
    Validity:
      type: object
      description: Validity window + long-tail conditions (src/domain/deal-record/validity.ts).
      required: [start, end, recheck_days]
      properties:
        start: { type: [string, 'null'] }
        end: { type: [string, 'null'] }
        recheck_days: { type: integer, minimum: 1 }
        conditions:
          type: array
          items: { $ref: '#/components/schemas/Condition' }
    PublishedSort:
      type: string
      enum: [cost_asc, verified_desc]
    TrustBadge:
      type: string
      description: Coarse freshness band derived from verified_at (never the raw score).
      enum: [recent, verified, stale]
    ReviewAction:
      type: string
      enum: [approve, reject, edit]

    # ── Public DTO (src/adapters/http/public-dto.ts) ────────────────────────
    PublicCondition:
      type: object
      required: [key, label]
      properties:
        key: { type: string }
        label: { type: string }
        value:
          type: object
          additionalProperties: true
      description: source_quote is deliberately stripped from the public shape.
    PublicDeal:
      type: object
      description: |
        Allow-listed public projection. Internal/LLM-audit fields (status, confidence,
        grounding, attributes, raw_conditions_text, evidence_id, verified_by,
        condition source_quote) are NEVER present.
      required:
        [id, service, provider, headline, route_type, country, price,
         true_cost_monthly, eligibility, validity, included_items, source_url,
         verified_at, published_at, affiliate_disclosure, trust, human_edited,
         evidence_screenshot_url]
      properties:
        id: { type: string, format: uuid }
        service: { type: string }
        provider: { type: string }
        headline: { type: string }
        route_type: { $ref: '#/components/schemas/RouteType' }
        country: { $ref: '#/components/schemas/Country' }
        price:
          type: object
          required: [amount, currency, billing]
          properties:
            amount: { type: number }
            currency: { $ref: '#/components/schemas/Currency' }
            billing: { $ref: '#/components/schemas/Billing' }
            prepaid_months:
              type: integer
              description: For billing=prepaid — months the up-front amount covers.
        true_cost_monthly: { type: number }
        eligibility:
          type: object
          required: [new_customer_only, residency_kyc, plan_tier_required, min_spend, stackable, conditions]
          properties:
            new_customer_only: { type: [boolean, 'null'] }
            residency_kyc: { type: [boolean, 'null'] }
            plan_tier_required: { type: [string, 'null'] }
            min_spend: { type: [number, 'null'] }
            stackable: { type: [boolean, 'null'] }
            conditions:
              type: array
              items: { $ref: '#/components/schemas/PublicCondition' }
        validity:
          type: object
          required: [start, end, recheck_days, conditions]
          properties:
            start: { type: [string, 'null'] }
            end: { type: [string, 'null'] }
            recheck_days: { type: integer }
            conditions:
              type: array
              items: { $ref: '#/components/schemas/PublicCondition' }
        included_items:
          type: array
          items: { type: string }
        source_url: { type: string, format: uri }
        verified_at: { type: [string, 'null'], format: date-time }
        published_at: { type: [string, 'null'], format: date-time }
        affiliate_disclosure: { type: boolean }
        trust: { $ref: '#/components/schemas/TrustBadge' }
        human_edited:
          type: array
          description: Field paths a human set/corrected (so a consumer never shows a corrected value as model-grounded).
          items: { type: string }
        evidence_screenshot_url:
          type: [string, 'null']
          format: uri
          description: Resolved from S3_CDN_BASE_URL; null when unset (e.g. local-fs evidence).
    PublicDealPage:
      type: object
      required: [deals, total, limit, offset]
      properties:
        deals:
          type: array
          items: { $ref: '#/components/schemas/PublicDeal' }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    # ── Admin records ───────────────────────────────────────────────────────
    DealRecord:
      type: object
      description: |
        The full internal deal record (src/domain/deal-record). The admin API returns
        this verbatim (unlike the curated PublicDeal). Only the trust-relevant fields
        are enumerated here; `attributes` and conditions carry the open extension areas.
      required: [id, schema_version, service, route_type, price, true_cost_monthly, country, status]
      properties:
        id: { type: string, format: uuid }
        schema_version: { type: integer }
        service: { type: string }
        route_type: { $ref: '#/components/schemas/RouteType' }
        provider: { type: [string, 'null'] }
        headline: { type: [string, 'null'] }
        price: { $ref: '#/components/schemas/Price' }
        true_cost_monthly: { type: number }
        country: { $ref: '#/components/schemas/Country' }
        status: { $ref: '#/components/schemas/DealStatus' }
        confidence: { type: number, minimum: 0, maximum: 1 }
        affiliate_disclosure: { type: boolean }
        published_at: { type: [string, 'null'], format: date-time }
        verified_by: { type: [string, 'null'] }
        verified_at: { type: [string, 'null'], format: date-time }
        evidence_id: { type: [string, 'null'], format: uuid }
        human_edited:
          type: array
          items: { type: string }
        source_url: { type: string, format: uri }
      additionalProperties: true
    Evidence:
      type: object
      description: |
        Evidence bundle as projected into a gated `/api/candidates` item
        (src/adapters/http/admin-evidence-dto.ts). The raw store pointers
        (`screenshot_ref`/`html_ref`/`terms_ref`) are kept — this is the reviewer
        console, not the public allow-list — and resolved CDN URLs are ADDED so the
        panel can render the captured screenshot / link the archived HTML directly
        (ACR-13). `evidence_screenshot_url` / `evidence_html_url` are `null` when no
        CDN base (`S3_CDN_BASE_URL`) is configured (e.g. local-fs evidence).
      properties:
        id: { type: string, format: uuid }
        source_url: { type: string, format: uri }
        screenshot_ref: { type: string }
        html_ref: { type: string }
        terms_ref: { type: string }
        captured_at: { type: string, format: date-time }
        content_hash: { type: string }
        evidence_screenshot_url:
          type: [string, 'null']
          format: uri
          description: Resolved CDN URL of the screenshot, or null when no CDN base is set.
        evidence_html_url:
          type: [string, 'null']
          format: uri
          description: Resolved CDN URL of the archived HTML, or null when no CDN base is set.
      additionalProperties: true
    CandidateView:
      type: object
      required: [deal, evidence]
      properties:
        deal: { $ref: '#/components/schemas/DealRecord' }
        evidence:
          oneOf:
            - { $ref: '#/components/schemas/Evidence' }
            - { type: 'null' }
    CandidateCounts:
      type: object
      description: Aggregate review-queue counts (ACR-5). All counts are non-negative integers.
      required: [all_pending, low_confidence, human_edited, rejected_today, by_route]
      properties:
        all_pending:
          type: integer
          minimum: 0
          description: Reviewable deals (status `candidate` + `in_review`).
        low_confidence:
          type: integer
          minimum: 0
          description: Reviewable deals with confidence ≤ 0.5 (inclusive).
        human_edited:
          type: integer
          minimum: 0
          description: Reviewable deals a human has corrected (`human_edited` non-empty).
        rejected_today:
          type: integer
          minimum: 0
          description: Deals rejected on the current UTC day (from the reviews audit log).
        by_route:
          type: object
          description: Reviewable counts per route type — every key present (0 when none).
          required: [bundle, standalone, promo, regional]
          properties:
            bundle: { type: integer, minimum: 0 }
            standalone: { type: integer, minimum: 0 }
            promo: { type: integer, minimum: 0 }
            regional: { type: integer, minimum: 0 }
          additionalProperties: false
      additionalProperties: false
    AuditEntry:
      type: object
      description: |
        One entry in the cross-deal audit feed (ACR-7), projected from a review row.
        `action` is currently limited to the persisted review decisions
        (`approve` · `reject` · `edit`); the panel additionally models `promote` /
        `extract`, which are not yet emitted (deferred).
      required: [id, initials, actor, action, detail, entity_id, at]
      properties:
        id: { type: string }
        initials:
          type: string
          description: 1–2 letter uppercase initials derived from the actor (avatar chip).
        actor: { type: string }
        action: { $ref: '#/components/schemas/ReviewAction' }
        detail: { type: [string, 'null'] }
        entity_id: { type: string, format: uuid }
        at: { type: string, format: date-time }
      additionalProperties: false
    AdminPublishedDeal:
      type: object
      description: One row on the admin "Published deals" screen (ACR-10).
      required: [id, service, provider, geo, true_monthly, published_at, status]
      properties:
        id: { type: string, format: uuid }
        service: { type: string }
        provider: { type: string }
        geo:
          type: string
          description: The deal's country (panel column "geo").
        true_monthly:
          type: number
          description: Amortised monthly true cost (panel column "true_monthly").
        published_at: { type: [string, 'null'], format: date-time }
        status:
          type: string
          enum: [live, re-review, unpublished]
          description: |
            Panel lifecycle status. `published` → `live`; `expired` → `unpublished`.
            `re-review` is reserved (no single backing pipeline status today).
      additionalProperties: false
    SourceRegistryEntry:
      type: object
      description: One row on the admin "Sources registry" screen (ACR-10).
      required: [id, domain, kind, tier, cadence, reliability, last_seen_at, status]
      properties:
        id: { type: string, format: uuid }
        domain:
          type: string
          description: Registrable domain (eTLD+1) if pinned, else the raw URL.
        kind:
          type: string
          description: Capitalised source type (Provider/Bundler/Community/Discovered/Aggregator).
        tier: { type: integer, enum: [1, 2, 3, 4] }
        cadence: { type: integer, description: Days between re-crawls. }
        reliability: { type: number, minimum: 0, maximum: 1 }
        last_seen_at: { type: [string, 'null'], format: date-time }
        status:
          type: string
          enum: [active, degraded, disabled]
          description: '`active` with reliability ≤ 0.3 → `degraded`; `disabled` stays `disabled`.'
      additionalProperties: false
    TeamMemberView:
      type: object
      description: A team member + derived review_count for the admin Team screen (ACR-10).
      required: [id, name, email, role, status, review_count]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [admin, reviewer] }
        status: { type: string, enum: [active, invited] }
        review_count:
          type: integer
          minimum: 0
          description: Decisions this member made (derived from the reviews audit log).
      additionalProperties: false
    ReviewRecord:
      type: object
      required: [action, approver, decided_at]
      properties:
        id: { type: string }
        deal_id: { type: string, format: uuid }
        action: { $ref: '#/components/schemas/ReviewAction' }
        approver: { type: string }
        reason: { type: [string, 'null'] }
        decided_at: { type: string, format: date-time }
      additionalProperties: true
    FieldProposalRecord:
      type: object
      description: A recurring novel condition key the LLM proposed (src/domain/proposals).
      properties:
        id: { type: string, format: uuid }
        suggested_key: { type: string }
        label: { type: string }
        rationale: { type: string }
        example_quote: { type: string }
        count: { type: integer }
        # Mirrors the domain enum (FieldProposalRecordSchema): an untriaged proposal
        # is `open` (NOT `pending`); a human promotion/rejection moves it to
        # `promoted`/`rejected`. (ACR-3: the spec previously drifted to [pending, promoted].)
        status: { type: string, enum: [open, promoted, rejected] }
        first_seen_at: { type: string, format: date-time }
        last_seen_at: { type: string, format: date-time }
      additionalProperties: true
    ConditionVocabularyEntry:
      type: object
      properties:
        key: { type: string }
        label: { type: string }
        aliases:
          type: array
          items: { type: string }
      additionalProperties: true
    ManualCaptureTask:
      type: object
      description: A human-capture task (src/domain/monitoring).
      properties:
        id: { type: string, format: uuid }
        status: { type: string }
        reason: { type: string }
        source_url: { type: [string, 'null'], format: uri }
      additionalProperties: true
    Source:
      type: object
      description: A crawl source (src/domain/source). Only key fields enumerated.
      properties:
        id: { type: string, format: uuid }
        url: { type: string, format: uri }
        type:
          type: string
          enum: [provider, bundler, community, discovered, aggregator]
        tier: { type: integer, enum: [1, 2, 3, 4] }
        status:
          type: string
          enum: [active, pending_approval, disabled, rejected]
        reliability_score: { type: number, minimum: 0, maximum: 1 }
        registrable_domain: { type: [string, 'null'] }
        resolved_url: { type: [string, 'null'], format: uri }
        proposal_reason:
          type: [string, 'null']
          description: |
            Short "why this domain was proposed" rationale, set when the source was
            surfaced by the discovery/ingest proposal loop and shown on the
            promotion queue (ACR-15). Null for seed/manually-added sources.
      additionalProperties: true
    SourceReviewRecord:
      type: object
      properties:
        id: { type: string }
        source_id: { type: string, format: uuid }
        action: { type: string, enum: [approve, reject] }
        approver: { type: string }
        reason: { type: [string, 'null'] }
        decided_at: { type: string, format: date-time }
      additionalProperties: true

    # ── Request bodies (mirror the zod schemas in review-api.ts) ────────────
    ApproverBody:
      type: object
      required: [approver]
      properties:
        approver: { type: string, minLength: 1 }
    RejectBody:
      type: object
      required: [approver]
      properties:
        approver: { type: string, minLength: 1 }
        reason: { type: string }
    ApproveCandidateBody:
      type: object
      required: [approver]
      properties:
        approver: { type: string, minLength: 1 }
        affiliate_disclosure:
          type: boolean
          description: EU-Omnibus disclosure; omitted ⇒ defaults true (over-disclose) + flagged.
    EditCandidateBody:
      type: object
      required: [approver, patch]
      properties:
        approver: { type: string, minLength: 1 }
        patch: { $ref: '#/components/schemas/CandidatePatch' }
    CandidatePatch:
      type: object
      description: |
        The exact allow-listed set of reviewer-editable fields (ACR-14) — the
        `PATCHABLE_FIELDS` enforced by the domain `applyCandidatePatch`
        (src/domain/rules/candidate-patch.ts). Every property is OPTIONAL (send only
        what changed). Any property NOT listed here (id, evidence_id, source_url,
        status, schema_version, confidence, grounding, verified_by/at, …) is rejected
        with 400 — identity / provenance / lifecycle are never editable. A price edit
        re-derives `true_cost_monthly` server-side; every changed path is tagged into
        the deal's `human_edited`.
      additionalProperties: false
      properties:
        price: { $ref: '#/components/schemas/Price' }
        true_cost_monthly:
          type: number
          minimum: 0
          description: Re-derived from `price` when price is also patched; an explicit value only sticks when price is untouched.
        country: { $ref: '#/components/schemas/Country' }
        route_type: { $ref: '#/components/schemas/RouteType' }
        headline: { type: string, minLength: 1 }
        eligibility: { $ref: '#/components/schemas/Eligibility' }
        validity: { $ref: '#/components/schemas/Validity' }
        included_items:
          type: array
          items: { type: string }
        attributes:
          type: object
          additionalProperties: true
    PromoteBody:
      type: object
      required: [approver, canonical_key, label]
      properties:
        approver: { type: string, minLength: 1 }
        canonical_key: { type: string, minLength: 1 }
        label: { type: string, minLength: 1 }
        target:
          type: string
          enum: [vocabulary, field]
          default: vocabulary
          description: '`field` returns 400 (not supported).'
    CompleteManualBody:
      type: object
      required: [approver, fields, evidence]
      properties:
        approver: { type: string, minLength: 1 }
        fields:
          type: object
          additionalProperties: true
          description: The human-entered deal fields.
        evidence:
          type: object
          required: [source_url, screenshot_ref, html_ref, terms_ref, terms_text]
          properties:
            source_url: { type: string, minLength: 1, format: uri }
            screenshot_ref: { type: string, minLength: 1 }
            html_ref: { type: string, minLength: 1 }
            terms_ref: { type: string, minLength: 1 }
            terms_text: { type: string, minLength: 1 }
