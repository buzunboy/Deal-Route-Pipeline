openapi: 3.1.0
info:
  title: DealRoute Pipeline API
  version: 1.0.0
  description: |
    HTTP surface of the DealRoute data-pipeline service, served by the `serve` CLI
    command on a single port (`REVIEW_API_PORT`, default 3000). Routers share the port
    via **total prefix dispatch**:

      * **Auth / IdP** — `/auth/*` + `/.well-known/jwks.json`: UNAUTHENTICATED. The
        pipeline is the identity provider: `POST /auth/login` exchanges email+password for
        a per-user ES256 access token + a rotating refresh token; `/auth/refresh` rotates;
        `/auth/logout` revokes. JWKS publishes the public key.
      * **Public read feed** — `/v1/*`: unauthenticated, READ-ONLY over `published`
        deals. Returns a curated DTO that NEVER leaks an internal field.
      * **Gated admin API** — `/api/*`: the review/approval surface consumed by the
        admin panel. **Every `/api/*` endpoint requires a per-user ES256 Bearer token**
        (reads + writes); writes additionally require a permission. The actor recorded on an
        audited decision is ALWAYS derived from the verified token — request bodies carry no
        `approver` field. As of Auth/IAM Phase 5 the per-user JWT is the ONLY auth path: the
        legacy static token (`REVIEW_API_TOKEN`) is retired (a stale token now 401s).
        `/api/health` stays open.
      * **Test page** — `/`: a thin built-in HTML harness over the `/api/*` endpoints.

    Trust invariants (see CLAUDE.md): the LLM only proposes candidates; **nothing
    auto-publishes** — a deal becomes `published` ONLY via `POST /api/candidates/:id/approve`
    by a human approver. Every `:id` is a UUID.

    ⚠️ SOURCE-OF-TRUTH: this file is the contract. When an endpoint, query param,
    request body, or response shape changes, THIS spec must change in the same commit
    (see `.claude/rules/api-and-openapi.md`). Keep `docs/api/dealroute.postman_collection.json`
    in step.
  license:
    name: UNLICENSED (private)
servers:
  - url: https://dealroute-api.fly.dev
    description: Production (Fly.io, region fra) — deployed 2026-06-22
  - url: http://localhost:3000
    description: Local dev (npm run cli -- serve)

tags:
  - name: Auth
    description: Unauthenticated IdP — login / refresh / logout / JWKS (per-user ES256 tokens).
  - name: Public feed
    description: Unauthenticated read-only `/v1/*` surface (landing page / public consumers).
  - name: Health
    description: Liveness probes.
  - name: Candidates
    description: Review queue — list, edit, approve, reject, audit. (admin)
  - name: Evidence
    description: Bearer-gated reviewer fetch of evidence artifact bytes (screenshot/html/terms). (admin)
  - name: Field proposals
    description: LLM-proposed novel condition keys awaiting promotion. (admin)
  - name: Manual capture
    description: Human-driven evidence capture tasks. (admin)
  - name: Sources
    description: Source-promotion loop — approve/reject proposed crawl sources. (admin)
  - name: Audit
    description: Cross-deal audit feed of recent review decisions. (admin)
  - name: Published
    description: Admin published-deals screen — publication history. (admin)
  - name: Team
    description: Reviewer registry + profile (the pipeline is the identity system of record). (admin)
  - name: Users
    description: Runtime IAM — provision / list / manage login-capable users (gated team:manage). (admin)
  - name: Roles
    description: Runtime RBAC — create / list / edit / delete permission bundles (gated roles:manage). (admin)
  - name: Permissions
    description: The permission catalogue + the caller's own effective permissions. (admin)
  - name: Alerts
    description: Persisted alerts — list, acknowledge, resolve (source reliability / budget). (admin)
  - name: Metrics
    description: Dashboard rollups — today's throughput, queue freshness, KPIs/cost/confidence. (admin)
  - name: Settings
    description: Operational settings — read the knobs; PATCH the writable ones (env mirrors are read-only). (admin)
  - name: Test page
    description: Built-in HTML review harness.

security: []

paths:
  # ───────────────────────────── AUTH / IdP ─────────────────────────────────
  /auth/login:
    post:
      tags: [Auth]
      summary: Exchange email + password for an access + refresh token
      operationId: authLogin
      description: |
        The credential IS the auth — unauthenticated. On success returns a short-lived
        ES256 access token (Bearer for `/api/*`), a rotating opaque refresh token (returned
        ONCE), and the user's flat permission list. The error is a GENERIC 401 for both an
        unknown email and a wrong password (no account enumeration); a disabled account is
        403; too many failed attempts is 429 with `Retry-After`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Authenticated — tokens + permissions.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthSession' }
        '400':
          description: Malformed / missing email or password.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Invalid email or password (generic — no enumeration).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: The account is disabled.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '413':
          description: Request body too large.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Too many failed attempts (locked); see `Retry-After`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate a refresh token for a fresh access + refresh pair
      operationId: authRefresh
      description: |
        The presented refresh token is REVOKED and a successor is issued in the same family
        (rotation). Replaying a rotated-out token is reuse-detection → the whole family is
        revoked and the call 401s. A disabled user cannot refresh. Permissions are
        re-resolved, so a `perm_version`-driven change reaches the new access token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200':
          description: A rotated token pair (same shape as login).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthSession' }
        '400':
          description: Missing / malformed `refreshToken`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Refresh token invalid / expired / reuse-detected.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: The account is disabled.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '413':
          description: Request body too large.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the presented refresh token's whole family
      operationId: authLogout
      description: |
        Idempotent — an unknown / already-revoked token still returns 204 (logout never
        confirms a token's validity). Revokes the entire rotation family.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '204':
          description: Logged out (empty body) — always, even for an unknown token.
        '400':
          description: Missing / malformed `refreshToken`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '413':
          description: Request body too large.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /.well-known/jwks.json:
    get:
      tags: [Auth]
      summary: The public ES256 key set (JWKS)
      operationId: getJwks
      description: |
        Public key material for verifying the access token (the pipeline verifies
        internally; this exists for external verifiers + the live smoke test). Public-only
        (never the private scalar). `Cache-Control: public, max-age=300`.
      security: []
      responses:
        '200':
          description: The JWKS.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Jwks' }

  # ───────────────────────────── PUBLIC /v1 ─────────────────────────────────
  /v1/health:
    get:
      tags: [Health]
      summary: Public feed liveness
      operationId: getPublicHealth
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }

  /v1/deals:
    get:
      tags: [Public feed]
      summary: List published deals (filtered, sorted, paginated)
      operationId: listPublishedDeals
      description: |
        Returns only `published` deals as the curated `PublicDeal` DTO. Sort is
        reliability-blended (the raw reliability score is never exposed): the primary
        key decides order, ties break by source reliability then id.
      security: []
      parameters:
        - name: service
          in: query
          description: Exact service name match (case-sensitive), e.g. `Disney+`.
          schema: { type: string, minLength: 1 }
        - name: country
          in: query
          description: ISO country (market-driven; DE for v1).
          schema: { $ref: '#/components/schemas/Country' }
        - name: route_type
          in: query
          schema: { $ref: '#/components/schemas/RouteType' }
        - name: price_max
          in: query
          description: Max true monthly cost (EUR), inclusive.
          schema: { type: number, minimum: 0 }
        - name: sort
          in: query
          schema:
            $ref: '#/components/schemas/PublishedSort'
          description: Default `cost_asc`.
        - name: limit
          in: query
          description: Page size. Default 20, hard-capped at 100.
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, maximum: 10000, default: 0 }
      responses:
        '200':
          description: A page of published deals.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicDealPage' }
        '400':
          description: Unknown query param, bad enum, non-numeric or over-cap value.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/deals/{id}:
    get:
      tags: [Public feed]
      summary: Get one published deal
      operationId: getPublishedDeal
      security: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: The deal (curated DTO).
          content:
            application/json:
              schema:
                type: object
                required: [deal]
                properties:
                  deal: { $ref: '#/components/schemas/PublicDeal' }
        '404':
          description: Missing OR not published (the two are indistinguishable by design).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ───────────────────────────── ADMIN /api ─────────────────────────────────
  /api/health:
    get:
      tags: [Health]
      summary: Admin API liveness
      operationId: getAdminHealth
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }

  /api/candidates:
    get:
      tags: [Candidates]
      summary: List candidates awaiting review (filtered, paginated)
      operationId: listCandidates
      description: |
        Lowest-confidence first. Defaults to the reviewable pair (`candidate` +
        `in_review`) when `status` is omitted. Requires a valid token (Auth/IAM Phase 2 —
        all `/api/*` reads now require auth). Each item's `evidence` carries
        `evidence_screenshot_url` / `evidence_html_url` / `evidence_terms_url` pointing at
        the gated `GET /api/evidence/:id/:artifact` endpoint (ACR-13).
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/DealStatus' }
        - name: service
          in: query
          schema: { type: string, minLength: 1 }
        - name: confidence_max
          in: query
          description: Inclusive upper bound on the stored confidence (0–1).
          schema: { type: number, minimum: 0, maximum: 1 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, maximum: 100000, default: 0 }
      responses:
        '200':
          description: Candidates, each joined with its evidence bundle.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CandidateView' }
        '400':
          description: Invalid filter / out-of-range pagination.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/candidates/counts:
    get:
      tags: [Candidates]
      summary: Aggregate review-queue counts for the view-cards + filter rail (ACR-5)
      operationId: getCandidateCounts
      description: |
        One call returns the queue's headline counts: `all_pending` (reviewable
        deals), `low_confidence` (confidence ≤ 0.5), `human_edited`, a per-route
        breakdown, and `rejected_today` (rejections on the current UTC day, from the
        reviews audit log — a true date-bounded count). Requires a valid token (Phase 2).
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The aggregate counts.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CandidateCounts' }

  /api/candidates/freshness:
    get:
      tags: [Candidates, Metrics]
      summary: Pending-queue freshness age-buckets (ACR-9)
      operationId: getCandidateFreshness
      description: |
        The share of the pending review queue (`candidate` + `in_review`) in each age
        band, where age is `now − evidence.captured_at`. The three bands are always
        returned, summing to 100 (an empty queue returns all three at 0). Backs the
        Dashboard "Queue freshness" card. Requires a valid token (Phase 2).
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The three freshness bands (freshest first).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FreshnessBand' }

  /api/candidates/{id}:
    patch:
      tags: [Candidates]
      summary: Edit a candidate's reviewer-correctable fields (before approve)
      operationId: editCandidate
      description: |
        Applies an allowlisted patch via the pure `applyCandidatePatch`. Re-validates,
        tags every changed field path into the deal's `human_edited`, keeps the model
        grounding quotes, and re-derives `true_cost_monthly` on a price change. Status
        stays `candidate`. Identity / provenance / status are never editable.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EditCandidateBody' }
      responses:
        '200': { $ref: '#/components/responses/DealEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '413': { $ref: '#/components/responses/TooLarge' }

  /api/candidates/{id}/approve:
    post:
      tags: [Candidates]
      summary: Approve a candidate → publish it
      operationId: approveCandidate
      description: |
        The ONLY path that sets a deal `published`. The reviewer may set the EU-Omnibus
        affiliate disclosure here; omitted ⇒ defaults to true (over-disclose) and flags it.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApproveCandidateBody' }
      responses:
        '200': { $ref: '#/components/responses/DealEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '413': { $ref: '#/components/responses/TooLarge' }

  /api/candidates/{id}/reject:
    post:
      tags: [Candidates]
      summary: Reject a candidate
      operationId: rejectCandidate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RejectBody' }
      responses:
        '200': { $ref: '#/components/responses/DealEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '413': { $ref: '#/components/responses/TooLarge' }

  /api/candidates/{id}/reviews:
    get:
      tags: [Candidates]
      summary: Audit history for a candidate
      operationId: listCandidateReviews
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Immutable review/audit log (who decided what, when, why).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ReviewRecord' }

  /api/evidence/{id}/{artifact}:
    get:
      tags: [Evidence]
      summary: Fetch one evidence artifact's bytes (Bearer-gated, reviewer-only)
      description: >
        Stream the raw bytes of ONE artifact (screenshot / archived HTML / verbatim
        terms text) of an evidence bundle. This is the AUTHENTICATED complement of the
        screenshot-only public CDN: the public CDN exposes only `screenshot.png`
        (it 403s html/terms), so a reviewer reaches the full bundle here instead. The
        admin `AdminEvidence` URLs (`evidence_*_url`) point at this path. Unlike the
        other read endpoints this GET REQUIRES the bearer — evidence bytes (raw HTML +
        verbatim copyrighted terms) are sensitive. Responses carry
        `Cache-Control: private, no-store`. `evidence.json` (metadata) is deliberately
        NOT exposed (it duplicates `GET /api/candidates`); an unknown artifact kind
        (or a non-UUID id) is a 404.
      operationId: getEvidenceArtifact
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - name: artifact
          in: path
          required: true
          description: Which artifact of the bundle to stream.
          schema:
            type: string
            enum: [screenshot, html, terms]
      responses:
        '200':
          description: The artifact bytes, with the stored content-type.
          content:
            image/png:
              schema: { type: string, format: binary }
            text/html:
              schema: { type: string, format: binary }
            text/plain:
              schema: { type: string, format: binary }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/audit:
    get:
      tags: [Audit]
      summary: Cross-deal audit feed of recent review decisions (ACR-7)
      operationId: getAuditFeed
      description: |
        Recent human review decisions across all deals, newest first — backs the
        Dashboard "recent activity" card and the Audit-log screen. Only the persisted
        review actions appear (`approve` · `reject` · `edit`); `promote`/`extract` are
        not yet recorded as audit rows (deferred). Requires a valid token (Phase 2).
      security:
        - bearerAuth: []
      parameters:
        - name: actor
          in: query
          description: Filter to one reviewer identity (approver).
          schema: { type: string, minLength: 1 }
        - name: entity_id
          in: query
          description: Filter to one entity (deal id).
          schema: { type: string, format: uuid }
        - name: since
          in: query
          description: Only decisions at/after this ISO-8601 instant.
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        '200':
          description: The recent-activity entries (newest first).
          content:
            application/json:
              schema:
                type: object
                required: [entries]
                properties:
                  entries:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEntry' }
                additionalProperties: false
        '400':
          description: Out-of-range limit or an unparseable `since`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/published:
    get:
      tags: [Published]
      summary: Admin "Published deals" screen — publication history (ACR-10)
      operationId: listAdminPublished
      description: |
        Live (`published`) + unpublished (`expired`) deals — publication HISTORY, not
        just the live feed — newest-published-first, paginated. Curated admin row
        (not the public allow-list, but not the whole record either). Requires a token.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, maximum: 100000, default: 0 }
      responses:
        '200':
          description: Published-screen rows + total.
          content:
            application/json:
              schema:
                type: object
                required: [deals, total]
                properties:
                  deals:
                    type: array
                    items: { $ref: '#/components/schemas/AdminPublishedDeal' }
                  total: { type: integer, minimum: 0 }
                additionalProperties: false
        '400':
          description: Out-of-range pagination.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/field-proposals:
    get:
      tags: [Field proposals]
      summary: List LLM field proposals (novel condition keys)
      operationId: listFieldProposals
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Field proposals awaiting promotion.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FieldProposalRecord' }

  /api/field-proposals/{key}/promote:
    post:
      tags: [Field proposals]
      summary: Promote a field proposal into the condition vocabulary
      operationId: promoteFieldProposal
      description: |
        Adds a `condition_vocabulary` row with the suggested key as an alias and marks
        the proposal `promoted`. `target:"field"` (promote to a first-class column) is
        not supported and returns 400.
      security:
        - bearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          description: The proposal's suggested key (URL-encoded).
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PromoteBody' }
      responses:
        '200':
          description: The created vocabulary entry.
          content:
            application/json:
              schema:
                type: object
                required: [vocabulary_entry]
                properties:
                  vocabulary_entry: { $ref: '#/components/schemas/ConditionVocabularyEntry' }
        '400':
          description: Validation failed, or `target:"field"` (not supported).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '413': { $ref: '#/components/responses/TooLarge' }

  /api/manual-capture-tasks:
    get:
      tags: [Manual capture]
      summary: List open manual-capture tasks
      operationId: listManualCaptureTasks
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Manual-capture tasks.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ManualCaptureTask' }
    post:
      tags: [Manual capture]
      summary: Create a candidate from an ad-hoc manual capture (no backing task, ACR-12)
      operationId: createManualCapture
      description: |
        For a deal a reviewer captures from scratch — NOT a crawler "couldn't read"
        task. Mints a `done` `ad_hoc` capture task AND an evidence-backed `candidate`
        in one call. Same trust contract as `/{id}/complete`: evidence REQUIRED (by
        reference), source_url pinned from the evidence, whole record `human_edited`,
        never auto-published. Distinct from `/{id}/complete`, which needs a task id.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CompleteManualBody' }
      responses:
        '201':
          description: Candidate created.
          content:
            application/json:
              schema:
                type: object
                required: [created, candidate_id]
                properties:
                  created: { type: boolean }
                  candidate_id: { type: string, format: uuid }
                additionalProperties: false
        '400':
          description: Missing fields, or incomplete evidence bundle.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '413': { $ref: '#/components/responses/TooLarge' }

  /api/manual-capture-tasks/{id}/complete:
    post:
      tags: [Manual capture]
      summary: Complete a manual-capture task → mint an evidence-backed candidate
      operationId: completeManualCaptureTask
      description: |
        Evidence is REQUIRED and supplied by reference (the human uploads artifacts
        out-of-band and passes the store keys + inline terms text). Mints a `candidate`,
        marks the whole record `human_edited`, and NEVER auto-publishes.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CompleteManualBody' }
      responses:
        '200': { $ref: '#/components/responses/DealEnvelope' }
        '400':
          description: Missing fields, or incomplete evidence bundle.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '413': { $ref: '#/components/responses/TooLarge' }

  /api/sources:
    get:
      tags: [Sources]
      summary: Sources registry — operational sources (active + disabled), ACR-10
      operationId: listSourceRegistry
      description: |
        The operational source list (NOT the pending-promotion queue). Curated rows:
        domain, capitalised kind, tier, cadence, reliability, last_seen, and a panel
        status (`active` · `degraded` for a flaky active source · `disabled`). Token req.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The sources registry.
          content:
            application/json:
              schema:
                type: object
                required: [sources]
                properties:
                  sources:
                    type: array
                    items: { $ref: '#/components/schemas/SourceRegistryEntry' }
                additionalProperties: false
    post:
      tags: [Sources]
      summary: Register a new operational source (the "+ Add source" flow, ACR-10)
      operationId: createSource
      description: |
        Builds an `active` source from the panel fields, pinning its registrable
        domain via the PSL. Idempotent on URL (re-adding a domain updates in place).
        `country` defaults to the active market (DE v1). Bearer-gated.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [domain, kind, tier]
              properties:
                domain:
                  type: string
                  minLength: 1
                  description: Bare domain (netflix.com) or full URL.
                kind:
                  type: string
                  description: provider | bundler | community | discovered | aggregator (case-insensitive).
                tier: { type: integer, enum: [1, 2, 3, 4] }
                country: { type: string, description: In-scope market; defaults to DE. }
                cadence_days: { type: integer, minimum: 1 }
              additionalProperties: false
      responses:
        '201':
          description: 'A NEW source was created (`created: true`).'
          content:
            application/json:
              schema:
                type: object
                required: [id, created]
                properties:
                  id: { type: string, format: uuid }
                  created: { type: boolean }
                additionalProperties: false
        '200':
          description: |
            An EXISTING active/disabled source for this URL was updated in place
            (`created: false`, `id` = the existing row's id).
          content:
            application/json:
              schema:
                type: object
                required: [id, created]
                properties:
                  id: { type: string, format: uuid }
                  created: { type: boolean }
                additionalProperties: false
        '400':
          description: Missing/invalid domain, kind, tier, or country.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409':
          description: |
            A source for this URL already exists as `rejected` or `pending_approval` —
            use the source-promotion loop, not register (governance guard).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '413': { $ref: '#/components/responses/TooLarge' }

  /api/sources/pending:
    get:
      tags: [Sources]
      summary: List proposed sources awaiting approval
      operationId: listPendingSources
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Pending sources.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Source' }

  /api/sources/{id}/approve:
    post:
      tags: [Sources]
      summary: Approve a proposed source
      operationId: approveSource
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApproverBody' }
      responses:
        '200': { $ref: '#/components/responses/SourceEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '413': { $ref: '#/components/responses/TooLarge' }

  /api/sources/{id}/reject:
    post:
      tags: [Sources]
      summary: Reject a proposed source
      operationId: rejectSource
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RejectBody' }
      responses:
        '200': { $ref: '#/components/responses/SourceEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '413': { $ref: '#/components/responses/TooLarge' }

  /api/sources/{id}/reviews:
    get:
      tags: [Sources]
      summary: Audit history for a source
      operationId: listSourceReviews
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Source review/audit log.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SourceReviewRecord' }

  /api/team:
    get:
      tags: [Team]
      summary: List team members with derived review counts (ACR-10)
      operationId: listTeam
      description: |
        Reviewer registry — the pipeline is the system of record for reviewer
        identity. Each member's `review_count` is DERIVED from the reviews audit log
        (by email = approver), so it never drifts. Requires a valid token (Phase 2).
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Team members.
          content:
            application/json:
              schema:
                type: object
                required: [members]
                properties:
                  members:
                    type: array
                    items: { $ref: '#/components/schemas/TeamMemberView' }
                additionalProperties: false
    post:
      tags: [Team]
      summary: Invite / register a team member (ACR-10)
      operationId: inviteTeamMember
      description: Idempotent on email (re-inviting updates name/role). Bearer-gated.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name: { type: string, minLength: 1 }
                email: { type: string, format: email }
                role: { type: string, enum: [admin, reviewer] }
              additionalProperties: false
      responses:
        '201':
          description: Member invited/registered.
          content:
            application/json:
              schema:
                type: object
                required: [id, invited, email]
                properties:
                  id: { type: string, format: uuid }
                  invited: { type: boolean }
                  email: { type: string }
                additionalProperties: false
        '400':
          description: Missing/invalid name, email, or role.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '413': { $ref: '#/components/responses/TooLarge' }

  /api/profile:
    patch:
      tags: [Team]
      summary: Update the signed-in reviewer's own profile — name and/or own password (ACR-11 + Phase 3)
      operationId: updateProfile
      description: |
        SELF-service, keyed by the caller's TOKEN email (the request carries no `approver`) — a
        user can only ever edit their OWN row. `name` edits the display name. `currentPassword`
        + `newPassword` (all-or-nothing) change the caller's OWN password: the current-password
        proof IS the authorization (no `team:manage` needed, unlike the admin reset on
        `/api/users/{id}`), a wrong current password is a 401, and a successful change bumps the
        user's `token_version` — logging out every other live session (the panel should
        re-login). At least one of `name` or the password pair must be present. Bearer-gated.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                name: { type: string, minLength: 1 }
                currentPassword:
                  type: string
                  minLength: 1
                  description: The caller's CURRENT password — required (with newPassword) to change it.
                newPassword:
                  type: string
                  minLength: 1
                  description: The new password; validated against the server password policy. Requires currentPassword.
              additionalProperties: false
      responses:
        '200':
          description: Profile updated.
          content:
            application/json:
              schema:
                type: object
                required: [updated, name, password_changed]
                properties:
                  updated: { type: boolean }
                  name: { type: [string, 'null'] }
                  password_changed:
                    type: boolean
                    description: True when this request changed the password (so the client should re-login).
                additionalProperties: false
        '400':
          description: Empty patch, a password pair that isn't all-or-nothing, a new password failing the policy, or no member for this caller.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Missing/invalid token, or (on a password change) a wrong current password.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '413': { $ref: '#/components/responses/TooLarge' }

  # ── Users & Roles admin (Auth/IAM Phase 3) ──
  /api/users:
    get:
      tags: [Users]
      summary: List login-capable users (Phase 3)
      operationId: listUsers
      description: |
        The runtime IAM Users screen — every user with its role NAME, status, and the
        `review_count` derived from the reviews audit log. The password hash is NEVER
        returned. Gated `team:manage`.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Users.
          content:
            application/json:
              schema:
                type: object
                required: [users]
                properties:
                  users:
                    type: array
                    items: { $ref: '#/components/schemas/AdminUserView' }
                additionalProperties: false
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Users]
      summary: Provision a login-capable user (Phase 3)
      operationId: provisionUser
      description: |
        One admin action creates a login-capable account (name/email/role + admin-set
        initial password): the user can `POST /auth/login` immediately and is restricted
        on the pipeline by their role. The actor recorded for the audit is the verified
        TOKEN email (the request carries no `approver`). Gated `team:manage`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, role, password]
              properties:
                name: { type: string, minLength: 1 }
                email: { type: string, format: email }
                role:
                  type: string
                  minLength: 1
                  description: 'An existing role NAME (e.g. reviewer, admin, or a custom role).'
                password:
                  type: string
                  minLength: 1
                  description: 'Admin-set initial password; validated against the server password policy (min length).'
              additionalProperties: false
      responses:
        '201':
          description: User created.
          content:
            application/json:
              schema:
                type: object
                required: [id, email, role]
                properties:
                  id: { type: string, format: uuid }
                  email: { type: string, format: email }
                  role: { type: string }
                additionalProperties: false
        '400':
          description: Missing/invalid fields, or the password fails the policy.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: The named role does not exist.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: A user already exists with that email.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '413': { $ref: '#/components/responses/TooLarge' }

  /api/users/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    patch:
      tags: [Users]
      summary: Update a user — role / status / password / name (Phase 3)
      operationId: patchUser
      description: |
        Change a user's `role`, `status` (active|disabled), or `password` — each gated
        `team:manage`. A user may edit their OWN `name` without `team:manage` (the self
        path); any privileged sub-field, or editing another user, requires `team:manage`.
        Changing role/status/password bumps the user's `token_version` (immediate revoke);
        disabling also revokes their refresh tokens. The LAST-ADMIN GUARD refuses to disable
        or demote the last active holder of `roles:manage`/`team:manage` (409).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                name: { type: string, minLength: 1 }
                role:
                  type: string
                  minLength: 1
                  description: An existing role NAME to reassign to.
                status: { type: string, enum: [active, disabled] }
                password:
                  type: string
                  minLength: 1
                  description: Admin password reset; validated against the policy.
              additionalProperties: false
      responses:
        '200':
          description: User updated.
          content:
            application/json:
              schema:
                type: object
                required: [updated]
                properties:
                  updated: { type: boolean }
                additionalProperties: false
        '400':
          description: Empty / invalid patch, or a password failing the policy.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: The user (or the named role) does not exist.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: The last-admin guard refused a disable/demote of the only admin.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '413': { $ref: '#/components/responses/TooLarge' }

  /api/roles:
    get:
      tags: [Roles]
      summary: List roles with their resolved permission sets (Phase 3)
      operationId: listRoles
      description: Every role + its permission keys (the panel role editor). Gated `roles:manage`.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Roles.
          content:
            application/json:
              schema:
                type: object
                required: [roles]
                properties:
                  roles:
                    type: array
                    items: { $ref: '#/components/schemas/RoleView' }
                additionalProperties: false
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Roles]
      summary: Create a custom role (Phase 3)
      operationId: createRole
      description: |
        Create a named permission bundle. Every key is validated against the closed
        permission enum (a bad key ⇒ 400). Bumps the global `perm_version`. Gated `roles:manage`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, permissions]
              properties:
                name: { type: string, minLength: 1 }
                description: { type: string }
                permissions:
                  type: array
                  items: { $ref: '#/components/schemas/Permission' }
              additionalProperties: false
      responses:
        '201':
          description: Role created.
          content:
            application/json:
              schema:
                type: object
                required: [role]
                properties:
                  role: { $ref: '#/components/schemas/RoleView' }
                additionalProperties: false
        '400':
          description: Missing name/permissions, or an unknown permission key.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: A role with that name already exists.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '413': { $ref: '#/components/responses/TooLarge' }

  /api/roles/{name}:
    parameters:
      - name: name
        in: path
        required: true
        description: The role NAME (a free-form string key, not a UUID).
        schema: { type: string, minLength: 1 }
    patch:
      tags: [Roles]
      summary: Update a role's description and/or permissions (Phase 3)
      operationId: updateRole
      description: |
        Replace the role's permission set and/or edit its description. A built-in
        `is_system` role's permission SET is immutable (409 on a permissions edit); its
        description may still be edited. A permission-set change bumps `perm_version`.
        Gated `roles:manage`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                description: { type: string }
                permissions:
                  type: array
                  items: { $ref: '#/components/schemas/Permission' }
              additionalProperties: false
      responses:
        '200':
          description: Role updated.
          content:
            application/json:
              schema:
                type: object
                required: [role]
                properties:
                  role: { $ref: '#/components/schemas/RoleView' }
                additionalProperties: false
        '400':
          description: Empty patch or an unknown permission key.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: The role does not exist.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: A built-in system role's permission set cannot be changed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '413': { $ref: '#/components/responses/TooLarge' }
    delete:
      tags: [Roles]
      summary: Delete a custom role (Phase 3)
      operationId: deleteRole
      description: |
        Delete a custom role. Refuses a built-in `is_system` role and a role still assigned
        to any user (both 409). Bumps `perm_version`. Gated `roles:manage`.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Role deleted.
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted: { type: boolean }
                additionalProperties: false
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: The role does not exist.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: A system role, or a role still assigned to users, cannot be deleted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/permissions:
    get:
      tags: [Permissions]
      summary: The permission catalogue (Phase 3)
      operationId: listPermissions
      description: |
        Every permission key + its human label (so the panel role editor can render the
        catalogue without the enum shipping to the client). Gated `roles:manage`.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The permission catalogue.
          content:
            application/json:
              schema:
                type: object
                required: [permissions]
                properties:
                  permissions:
                    type: array
                    items:
                      type: object
                      required: [key, label]
                      properties:
                        key: { $ref: '#/components/schemas/Permission' }
                        label:
                          type: string
                          description: Human-readable label for the role-editor matrix.
                      additionalProperties: false
                additionalProperties: false
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/permissions/me:
    get:
      tags: [Permissions]
      summary: The caller's own effective permissions (Phase 3)
      operationId: myPermissions
      description: |
        The authenticated caller's role + effective permission set (from the verified
        token). Any valid token — no named permission required. The panel uses it to gate
        page access (cosmetic; the pipeline is the real gate).
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The caller's identity + permissions.
          content:
            application/json:
              schema:
                type: object
                required: [email, role, permissions]
                properties:
                  email:
                    type: string
                    format: email
                    description: The verified token email (the signed-in user).
                  role: { type: string }
                  permissions:
                    type: array
                    items: { $ref: '#/components/schemas/Permission' }
                additionalProperties: false
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/alerts:
    get:
      tags: [Alerts]
      summary: List persisted alerts + the open count (ACR-8)
      operationId: listAlerts
      description: |
        Recent alerts (newest first) with their EFFECTIVE status — a budget alert from
        a past UTC day and a reliability alert whose source has recovered auto-resolve
        at read time; a manual ack/resolve always wins. `open_count` feeds the top-bar
        bell badge. Requires a valid token (Phase 2).
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        '200':
          description: Alerts + open count.
          content:
            application/json:
              schema:
                type: object
                required: [alerts, open_count]
                properties:
                  alerts:
                    type: array
                    items: { $ref: '#/components/schemas/AlertView' }
                  open_count: { type: integer, minimum: 0 }
                additionalProperties: false
        '400':
          description: Out-of-range limit.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/alerts/{id}/acknowledge:
    post:
      tags: [Alerts]
      summary: Acknowledge an alert (ACR-8)
      operationId: acknowledgeAlert
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApproverBody' }
      responses:
        '200':
          description: Acknowledged.
          content:
            application/json:
              schema:
                type: object
                required: [acknowledged]
                properties: { acknowledged: { type: boolean } }
                additionalProperties: false
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '413': { $ref: '#/components/responses/TooLarge' }

  /api/alerts/{id}/resolve:
    post:
      tags: [Alerts]
      summary: Resolve an alert (ACR-8)
      operationId: resolveAlert
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApproverBody' }
      responses:
        '200':
          description: Resolved.
          content:
            application/json:
              schema:
                type: object
                required: [resolved]
                properties: { resolved: { type: boolean } }
                additionalProperties: false
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '413': { $ref: '#/components/responses/TooLarge' }

  # ───────────────────────────── METRICS ────────────────────────────────────
  /api/metrics/throughput:
    get:
      tags: [Metrics]
      summary: Today's reviewer-throughput summary (ACR-6)
      operationId: getThroughput
      description: |
        Counts of today's (UTC) approve/reject/edit decisions plus the mean
        capture→decision latency (`avg_review_seconds`, or null when no decision today
        has a resolvable capture time). Backs the Dashboard "Today's throughput" card.
        Requires a valid token (Phase 2).
      security:
        - bearerAuth: []
      parameters:
        - name: period
          in: query
          description: The window. Only `today` is supported in v1; any other value is a 400.
          schema: { type: string, enum: [today], default: today }
      responses:
        '200':
          description: Today's throughput summary.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ThroughputSummary' }
        '400':
          description: An unsupported `period`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/metrics:
    get:
      tags: [Metrics]
      summary: Metrics screen rollup — KPIs / cost-per-day / confidence (ACR-10 Metrics)
      operationId: getMetrics
      description: |
        KPI cards, the last 14 UTC days of crawl cost, and the pending-queue confidence
        distribution — all derived from real pipeline data (`crawl_runs` + the `reviews`
        log + the pending `deals`). Backs the Metrics screen. Requires a valid token.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The dashboard-metrics rollup.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DashboardMetrics' }

  # ───────────────────────────── SETTINGS ───────────────────────────────────
  /api/settings:
    get:
      tags: [Settings]
      summary: Read the operational settings (ACR-10 Settings)
      operationId: getSettings
      description: |
        The grouped settings view: panel-editable knobs PLUS read-only env/derived
        mirrors (each row carries `read_only`). A writable knob shows its stored override
        if set, else the live config value. Requires a valid token (Phase 2).
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The grouped settings view.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SettingsView' }

  /api/settings/{key}:
    patch:
      tags: [Settings]
      summary: Update one writable setting (ACR-10 Settings)
      operationId: updateSetting
      description: |
        Set a writable knob's override (`affiliate_disclosure`, `daily_budget_queued`).
        `affiliate_disclosure` takes effect immediately; `daily_budget_queued` is stamped
        with the current deployment and applies on the NEXT deploy, then self-clears (the
        in-effect `daily_budget` is read-only). A read-only or unknown key is a 409; an
        invalid value is a 400.
      security:
        - bearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateSettingBody' }
      responses:
        '200':
          description: The update result.
          content:
            application/json:
              schema:
                type: object
                required: [key, updated]
                properties:
                  key: { type: string }
                  updated: { type: boolean }
                additionalProperties: false
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409':
          description: The key is read-only or unknown (not writable via the API).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '413': { $ref: '#/components/responses/TooLarge' }

  # ───────────────────────────── TEST PAGE ──────────────────────────────────
  /:
    get:
      tags: [Test page]
      summary: Built-in HTML review harness
      operationId: getTestPage
      security: []
      responses:
        '200':
          description: The review test page (thin UI over `/api/*`).
          content:
            text/html:
              schema: { type: string }
        '404':
          description: No static page configured.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        `Authorization: Bearer <token>` on EVERY `/api/*` endpoint — reads included
        (`/api/health` is the one exception). The token is a per-user ES256 access token from
        `POST /auth/login`; identity + permissions come from the verified claims and the
        recorded actor is ALWAYS derived from the token (request bodies carry no `approver`).
        As of Auth/IAM Phase 5 this is the ONLY auth path: the legacy static `REVIEW_API_TOKEN`
        is retired (a stale token 401s), and `serve` hard-fails at startup without a signing
        key (there is no open/trusted-network fallback). Writes additionally require the
        route's permission.

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: Resource UUID. A non-UUID currently yields 500 (see docs/KNOWN_ISSUES.md).
      schema: { type: string, format: uuid }

  responses:
    DealEnvelope:
      description: The affected deal.
      content:
        application/json:
          schema:
            type: object
            required: [deal]
            properties:
              deal: { $ref: '#/components/schemas/DealRecord' }
    SourceEnvelope:
      description: The affected source.
      content:
        application/json:
          schema:
            type: object
            required: [source]
            properties:
              source: { $ref: '#/components/schemas/Source' }
    BadRequest:
      description: Malformed JSON body or failed validation.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Missing or wrong Bearer token.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Authenticated but lacking the permission this route requires.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Resource is not in a state that allows this action (e.g. not reviewable).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    TooLarge:
      description: Request body exceeds the 64 KiB cap.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Health:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean, const: true }

    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }

    # ── Auth / IdP (mirror src/adapters/http/auth-api.ts + AuthSession) ──
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 1 }
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string, minLength: 1 }
    AuthSession:
      type: object
      description: |
        The result of a successful login / refresh. `refreshToken` is the RAW opaque token,
        returned ONCE (only its hash is stored). Times are absolute epoch milliseconds.
      required:
        [accessToken, accessTokenExpires, refreshToken, refreshTokenExpires, permissions, user]
      properties:
        accessToken: { type: string, description: ES256 JWS compact access token (Bearer for /api/*). }
        accessTokenExpires: { type: integer, description: Access-token expiry (epoch ms). }
        refreshToken: { type: string, description: Opaque rotating refresh token (returned once). }
        refreshTokenExpires: { type: integer, description: Refresh-token expiry (epoch ms). }
        permissions:
          type: array
          description: The user's effective permission keys (flat — the panel never decodes the JWT).
          items: { type: string }
        user:
          type: object
          required: [id, email, name, role]
          properties:
            id: { type: string, format: uuid }
            email: { type: string, format: email }
            name: { type: string }
            role: { type: string, description: Role name (display only — authz is by permission). }
    Jwk:
      type: object
      description: A single public JSON Web Key (EC P-256, ES256). Never the private scalar `d`.
      required: [kty]
      properties:
        kty: { type: string, example: EC }
        crv: { type: string, example: P-256 }
        x: { type: string }
        y: { type: string }
        kid: { type: string }
        alg: { type: string, example: ES256 }
        use: { type: string, example: sig }
    Jwks:
      type: object
      required: [keys]
      properties:
        keys:
          type: array
          items: { $ref: '#/components/schemas/Jwk' }

    # ── Enums (mirror src/domain/deal-record/enums.ts + published-query.ts) ──
    RouteType:
      type: string
      enum: [bundle, standalone, promo, regional]
    Billing:
      type: string
      enum: [monthly, annual, one_time, prepaid, unknown]
    DealStatus:
      type: string
      enum: [candidate, in_review, published, expired, rejected]
    Country:
      type: string
      description: Market-driven (src/domain/markets/markets.ts). DE for v1.
      enum: [DE]
    Currency:
      type: string
      description: Market-driven. EUR for v1.
      enum: [EUR]
    Price:
      type: object
      description: A deal price (src/domain/deal-record/price.ts).
      required: [amount, currency, billing]
      properties:
        amount: { type: number, minimum: 0 }
        currency: { $ref: '#/components/schemas/Currency' }
        billing: { $ref: '#/components/schemas/Billing' }
        prepaid_months:
          type: integer
          minimum: 1
          description: 'For `billing: prepaid` only — months the up-front `amount` covers.'
    Condition:
      type: object
      description: A long-tail eligibility/validity condition mapped to the vocabulary.
      required: [key, label]
      properties:
        key: { type: string, minLength: 1 }
        label: { type: string, minLength: 1 }
        value:
          type: [object, 'null']
          additionalProperties: true
        source_quote: { type: string }
    Eligibility:
      type: object
      description: Eligibility core flags + long-tail conditions (src/domain/deal-record/eligibility.ts).
      required: [new_customer_only, residency_kyc, plan_tier_required, min_spend, stackable]
      properties:
        new_customer_only: { type: [boolean, 'null'] }
        residency_kyc: { type: [boolean, 'null'] }
        plan_tier_required: { type: [string, 'null'] }
        min_spend: { type: [number, 'null'], minimum: 0 }
        stackable: { type: [boolean, 'null'] }
        conditions:
          type: array
          items: { $ref: '#/components/schemas/Condition' }
    Validity:
      type: object
      description: Validity window + long-tail conditions (src/domain/deal-record/validity.ts).
      required: [start, end, recheck_days]
      properties:
        start: { type: [string, 'null'] }
        end: { type: [string, 'null'] }
        recheck_days: { type: integer, minimum: 1 }
        conditions:
          type: array
          items: { $ref: '#/components/schemas/Condition' }
    PublishedSort:
      type: string
      enum: [cost_asc, verified_desc]
    TrustBadge:
      type: string
      description: Coarse freshness band derived from verified_at (never the raw score).
      enum: [recent, verified, stale]
    ReviewAction:
      type: string
      enum: [approve, reject, edit]

    # ── Public DTO (src/adapters/http/public-dto.ts) ────────────────────────
    PublicCondition:
      type: object
      required: [key, label]
      properties:
        key: { type: string }
        label: { type: string }
        value:
          type: object
          additionalProperties: true
      description: source_quote is deliberately stripped from the public shape.
    PublicDeal:
      type: object
      description: |
        Allow-listed public projection. Internal/LLM-audit fields (status, confidence,
        grounding, attributes, raw_conditions_text, evidence_id, verified_by,
        condition source_quote) are NEVER present.
      required:
        [id, service, provider, headline, route_type, country, price,
         true_cost_monthly, eligibility, validity, included_items, source_url,
         verified_at, published_at, affiliate_disclosure, trust, human_edited,
         evidence_screenshot_url]
      properties:
        id: { type: string, format: uuid }
        service: { type: string }
        provider: { type: string }
        headline: { type: string }
        route_type: { $ref: '#/components/schemas/RouteType' }
        country: { $ref: '#/components/schemas/Country' }
        price:
          type: object
          required: [amount, currency, billing]
          properties:
            amount: { type: number }
            currency: { $ref: '#/components/schemas/Currency' }
            billing: { $ref: '#/components/schemas/Billing' }
            prepaid_months:
              type: integer
              description: For billing=prepaid — months the up-front amount covers.
        true_cost_monthly: { type: number }
        eligibility:
          type: object
          required: [new_customer_only, residency_kyc, plan_tier_required, min_spend, stackable, conditions]
          properties:
            new_customer_only: { type: [boolean, 'null'] }
            residency_kyc: { type: [boolean, 'null'] }
            plan_tier_required: { type: [string, 'null'] }
            min_spend: { type: [number, 'null'] }
            stackable: { type: [boolean, 'null'] }
            conditions:
              type: array
              items: { $ref: '#/components/schemas/PublicCondition' }
        validity:
          type: object
          required: [start, end, recheck_days, conditions]
          properties:
            start: { type: [string, 'null'] }
            end: { type: [string, 'null'] }
            recheck_days: { type: integer }
            conditions:
              type: array
              items: { $ref: '#/components/schemas/PublicCondition' }
        included_items:
          type: array
          items: { type: string }
        source_url: { type: string, format: uri }
        verified_at: { type: [string, 'null'], format: date-time }
        published_at: { type: [string, 'null'], format: date-time }
        affiliate_disclosure: { type: boolean }
        trust: { $ref: '#/components/schemas/TrustBadge' }
        human_edited:
          type: array
          description: Field paths a human set/corrected (so a consumer never shows a corrected value as model-grounded).
          items: { type: string }
        evidence_screenshot_url:
          type: [string, 'null']
          format: uri
          description: Resolved from S3_CDN_BASE_URL; null when unset (e.g. local-fs evidence).
    PublicDealPage:
      type: object
      required: [deals, total, limit, offset]
      properties:
        deals:
          type: array
          items: { $ref: '#/components/schemas/PublicDeal' }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    # ── Admin records ───────────────────────────────────────────────────────
    DealRecord:
      type: object
      description: |
        The full internal deal record (src/domain/deal-record). The admin API returns
        this verbatim (unlike the curated PublicDeal). Only the trust-relevant fields
        are enumerated here; `attributes` and conditions carry the open extension areas.
      required: [id, schema_version, service, route_type, price, true_cost_monthly, country, status]
      properties:
        id: { type: string, format: uuid }
        schema_version: { type: integer }
        service: { type: string }
        route_type: { $ref: '#/components/schemas/RouteType' }
        provider: { type: [string, 'null'] }
        headline: { type: [string, 'null'] }
        price: { $ref: '#/components/schemas/Price' }
        true_cost_monthly: { type: number }
        country: { $ref: '#/components/schemas/Country' }
        status: { $ref: '#/components/schemas/DealStatus' }
        confidence: { type: number, minimum: 0, maximum: 1 }
        affiliate_disclosure: { type: boolean }
        published_at: { type: [string, 'null'], format: date-time }
        verified_by: { type: [string, 'null'] }
        verified_at: { type: [string, 'null'], format: date-time }
        evidence_id: { type: [string, 'null'], format: uuid }
        human_edited:
          type: array
          items: { type: string }
        source_url: { type: string, format: uri }
      additionalProperties: true
    Evidence:
      type: object
      description: |
        Evidence bundle as projected into a gated `/api/candidates` item
        (src/adapters/http/admin-evidence-dto.ts). The raw store pointers
        (`screenshot_ref`/`html_ref`/`terms_ref`) are kept — this is the reviewer
        console, not the public allow-list — and the three `evidence_*_url` fields are
        ADDED so the panel can render the captured screenshot / link the archived HTML
        + terms (ACR-13). These URLs point at the AUTHED endpoint
        `GET /api/evidence/:id/:artifact` (NOT the public CDN — which is screenshot-only
        and 403s html/terms), so they work for a reviewer regardless of CDN config. They
        are RELATIVE (`/api/evidence/<id>/<kind>`) and always present when a bundle
        exists; the panel must fetch them with its bearer header (an `<img src>` can't
        carry it) and render via a blob URL.
      properties:
        id: { type: string, format: uuid }
        source_url: { type: string, format: uri }
        screenshot_ref: { type: string }
        html_ref: { type: string }
        terms_ref: { type: string }
        captured_at: { type: string, format: date-time }
        content_hash: { type: string }
        evidence_screenshot_url:
          type: string
          description: Authed-path URL of the screenshot (`/api/evidence/:id/screenshot`).
        evidence_html_url:
          type: string
          description: Authed-path URL of the archived HTML (`/api/evidence/:id/html`).
        evidence_terms_url:
          type: string
          description: Authed-path URL of the terms text (`/api/evidence/:id/terms`).
      additionalProperties: true
    CandidateView:
      type: object
      required: [deal, evidence]
      properties:
        deal: { $ref: '#/components/schemas/DealRecord' }
        evidence:
          oneOf:
            - { $ref: '#/components/schemas/Evidence' }
            - { type: 'null' }
    CandidateCounts:
      type: object
      description: Aggregate review-queue counts (ACR-5). All counts are non-negative integers.
      required: [all_pending, low_confidence, human_edited, rejected_today, by_route]
      properties:
        all_pending:
          type: integer
          minimum: 0
          description: Reviewable deals (status `candidate` + `in_review`).
        low_confidence:
          type: integer
          minimum: 0
          description: Reviewable deals with confidence ≤ 0.5 (inclusive).
        human_edited:
          type: integer
          minimum: 0
          description: Reviewable deals a human has corrected (`human_edited` non-empty).
        rejected_today:
          type: integer
          minimum: 0
          description: Deals rejected on the current UTC day (from the reviews audit log).
        by_route:
          type: object
          description: Reviewable counts per route type — every key present (0 when none).
          required: [bundle, standalone, promo, regional]
          properties:
            bundle: { type: integer, minimum: 0 }
            standalone: { type: integer, minimum: 0 }
            promo: { type: integer, minimum: 0 }
            regional: { type: integer, minimum: 0 }
          additionalProperties: false
      additionalProperties: false
    AuditEntry:
      type: object
      description: |
        One entry in the cross-deal audit feed (ACR-7), projected from a review row.
        `action` is currently limited to the persisted review decisions
        (`approve` · `reject` · `edit`); the panel additionally models `promote` /
        `extract`, which are not yet emitted (deferred).
      required: [id, initials, actor, action, detail, entity_id, at]
      properties:
        id: { type: string }
        initials:
          type: string
          description: 1–2 letter uppercase initials derived from the actor (avatar chip).
        actor: { type: string }
        action: { $ref: '#/components/schemas/ReviewAction' }
        detail: { type: [string, 'null'] }
        entity_id: { type: string, format: uuid }
        at: { type: string, format: date-time }
      additionalProperties: false
    AdminPublishedDeal:
      type: object
      description: One row on the admin "Published deals" screen (ACR-10).
      required: [id, service, provider, geo, true_monthly, published_at, status]
      properties:
        id: { type: string, format: uuid }
        service: { type: string }
        provider: { type: string }
        geo:
          type: string
          description: The deal's country (panel column "geo").
        true_monthly:
          type: number
          description: Amortised monthly true cost (panel column "true_monthly").
        published_at: { type: [string, 'null'], format: date-time }
        status:
          type: string
          enum: [live, re-review, unpublished]
          description: |
            Panel lifecycle status. `published` → `live`; `expired` → `unpublished`.
            `re-review` is reserved (no single backing pipeline status today).
      additionalProperties: false
    ThroughputSummary:
      type: object
      description: |
        Today's reviewer-throughput summary (ACR-6). `approved`/`rejected`/`edited`
        count the review decisions taken on the current UTC day. `avg_review_seconds`
        is the mean `decided_at − evidence.captured_at` over those decisions, in whole
        seconds, or `null` when no decision today has a resolvable capture time.
      required: [approved, rejected, edited, avg_review_seconds]
      properties:
        approved: { type: integer, minimum: 0 }
        rejected: { type: integer, minimum: 0 }
        edited: { type: integer, minimum: 0 }
        avg_review_seconds: { type: [integer, 'null'], minimum: 0 }
      additionalProperties: false
    FreshnessBand:
      type: object
      description: |
        One pending-queue freshness band (ACR-9): the share of reviewable candidates
        whose age (`now − evidence.captured_at`) falls in this band. The three bands are
        always returned, summing to 100 (an empty queue returns all three at 0).
      required: [bucket, percent]
      properties:
        bucket:
          type: string
          enum: ['<24h', '1-3d', '>3d']
        percent: { type: integer, minimum: 0, maximum: 100 }
      additionalProperties: false
    MetricKpi:
      type: object
      description: One KPI card on the Metrics screen (ACR-10 Metrics).
      required: [key, label, value, trend, direction]
      properties:
        key: { type: string }
        label: { type: string }
        value:
          type: string
          description: 'Pre-formatted value (e.g. "€164", "72%", "0.83").'
        trend:
          type: string
          description: Trend caption; empty string when none.
        direction:
          type: string
          enum: [up-good, up-bad, down-good, down-bad, flat]
      additionalProperties: false
    CostBar:
      type: object
      description: One bar in the cost-per-day chart (ACR-10 Metrics).
      required: [day, cost, highlight]
      properties:
        day:
          type: string
          description: 'UTC day-of-month label (e.g. "08").'
        cost:
          type: number
          minimum: 0
          description: Crawl cost in euros for that UTC day.
        highlight:
          type: boolean
          description: Whether this is one of the recent highlighted days.
      additionalProperties: false
    ConfidenceBand:
      type: object
      description: One confidence-distribution band (ACR-10 Metrics), colored by trust level.
      required: [label, percent, level]
      properties:
        label: { type: string }
        percent: { type: integer, minimum: 0, maximum: 100 }
        level: { type: string, enum: [success, warning, danger] }
      additionalProperties: false
    DashboardMetrics:
      type: object
      description: |
        The Metrics screen rollup (ACR-10 Metrics): KPI cards, the cost-per-day chart,
        and the pending-queue confidence distribution. Every value is derived from real
        pipeline data (`crawl_runs` + the `reviews` log + the pending `deals`).
      required: [kpis, cost_per_day, confidence_distribution]
      properties:
        kpis:
          type: array
          items: { $ref: '#/components/schemas/MetricKpi' }
        cost_per_day:
          type: array
          items: { $ref: '#/components/schemas/CostBar' }
        confidence_distribution:
          type: array
          items: { $ref: '#/components/schemas/ConfidenceBand' }
      additionalProperties: false
    SettingRow:
      type: object
      description: |
        One settings row (ACR-10 Settings). A discriminated union on `control`: a
        `toggle` carries `enabled` (boolean), a `value` carries `value` (string). Every
        row carries `read_only` — true for env/derived mirrors the panel must render as
        view-only (a PATCH on them is a 409); false for the panel-editable knobs.
      required: [key, label, control, read_only]
      oneOf:
        - type: object
          required: [key, label, control, enabled, read_only]
          properties:
            key: { type: string }
            label: { type: string }
            hint: { type: string }
            control: { type: string, enum: [toggle] }
            enabled: { type: boolean }
            read_only: { type: boolean }
          additionalProperties: false
        - type: object
          required: [key, label, control, value, read_only]
          properties:
            key: { type: string }
            label: { type: string }
            hint: { type: string }
            control: { type: string, enum: [value] }
            value: { type: string }
            read_only: { type: boolean }
          additionalProperties: false
    SettingsGroup:
      type: object
      description: A labelled group of settings rows (e.g. Pipeline / Review defaults / Markets).
      required: [key, label, rows]
      properties:
        key: { type: string }
        label: { type: string }
        rows:
          type: array
          items: { $ref: '#/components/schemas/SettingRow' }
      additionalProperties: false
    SettingsView:
      type: object
      description: The grouped Settings screen view (ACR-10 Settings).
      required: [groups]
      properties:
        groups:
          type: array
          items: { $ref: '#/components/schemas/SettingsGroup' }
      additionalProperties: false
    UpdateSettingBody:
      type: object
      description: |
        PATCH body for one writable setting (ACR-10 Settings). `value` is loosely typed
        (a toggle sends a boolean, a value chip a string/number); the pipeline's per-key
        rule validates + normalises it. A read-only / unknown key is a 409.
      required: [value]
      properties:
        value:
          oneOf:
            - { type: string }
            - { type: number }
            - { type: boolean }
      additionalProperties: false
    SourceRegistryEntry:
      type: object
      description: One row on the admin "Sources registry" screen (ACR-10).
      required: [id, domain, kind, tier, cadence, reliability, last_seen_at, status]
      properties:
        id: { type: string, format: uuid }
        domain:
          type: string
          description: Registrable domain (eTLD+1) if pinned, else the raw URL.
        kind:
          type: string
          description: Capitalised source type (Provider/Bundler/Community/Discovered/Aggregator).
        tier: { type: integer, enum: [1, 2, 3, 4] }
        cadence: { type: integer, description: Days between re-crawls. }
        reliability: { type: number, minimum: 0, maximum: 1 }
        last_seen_at: { type: [string, 'null'], format: date-time }
        status:
          type: string
          enum: [active, degraded, disabled]
          description: '`active` with reliability ≤ 0.3 → `degraded`; `disabled` stays `disabled`.'
      additionalProperties: false
    TeamMemberView:
      type: object
      description: A team member + derived review_count for the admin Team screen (ACR-10).
      required: [id, name, email, role, status, review_count]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [admin, reviewer] }
        status: { type: string, enum: [active, invited] }
        review_count:
          type: integer
          minimum: 0
          description: Decisions this member made (derived from the reviews audit log).
      additionalProperties: false
    Permission:
      type: string
      description: |
        A fine-grained permission key (Auth/IAM). Roles are named bundles of these; pages
        and APIs require a permission, never a role name. The closed universe of keys —
        mirrors the `Permission` enum in src/domain/auth/permission.ts.
      enum:
        - candidate:read
        - candidate:approve
        - candidate:reject
        - candidate:edit
        - sources:read
        - sources:write
        - sources:review
        - settings:read
        - settings:write
        - team:read
        - team:manage
        - roles:manage
        - alerts:manage
        - field-proposals:promote
        - manual-capture:write
        - evidence:read
        - system:foundations
    AdminUserView:
      type: object
      description: A login-capable user for the admin Users screen (Auth/IAM Phase 3). No hash.
      required: [id, name, email, role, status, review_count]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        role: { type: string, description: The user's role NAME. }
        status: { type: string, enum: [active, invited, disabled] }
        review_count:
          type: integer
          minimum: 0
          description: Decisions this user made (derived from the reviews audit log).
      additionalProperties: false
    RoleView:
      type: object
      description: A role + its resolved permission set (Auth/IAM Phase 3).
      required: [id, name, description, is_system, permissions]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        is_system:
          type: boolean
          description: A built-in role (admin/reviewer) — its permission set is immutable and it can't be deleted.
        permissions:
          type: array
          items: { $ref: '#/components/schemas/Permission' }
      additionalProperties: false
    AlertView:
      type: object
      description: One alert as the admin panel sees it (ACR-8), with effective status.
      required: [id, title, body, severity, status, at]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        body: { type: string }
        severity: { type: string, enum: [info, warning, critical] }
        status:
          type: string
          enum: [open, acknowledged, resolved]
          description: |
            Effective status: a budget alert from a past UTC day and a reliability
            alert whose source recovered auto-resolve at read time; a manual
            ack/resolve always wins.
        at: { type: string, format: date-time }
      additionalProperties: false
    ReviewRecord:
      type: object
      required: [action, approver, decided_at]
      properties:
        id: { type: string }
        deal_id: { type: string, format: uuid }
        action: { $ref: '#/components/schemas/ReviewAction' }
        approver: { type: string }
        reason: { type: [string, 'null'] }
        decided_at: { type: string, format: date-time }
      additionalProperties: true
    FieldProposalRecord:
      type: object
      description: A recurring novel condition key the LLM proposed (src/domain/proposals).
      properties:
        id: { type: string, format: uuid }
        suggested_key: { type: string }
        label: { type: string }
        rationale: { type: string }
        example_quote: { type: string }
        count: { type: integer }
        # Mirrors the domain enum (FieldProposalRecordSchema): an untriaged proposal
        # is `open` (NOT `pending`); a human promotion/rejection moves it to
        # `promoted`/`rejected`. (ACR-3: the spec previously drifted to [pending, promoted].)
        status: { type: string, enum: [open, promoted, rejected] }
        first_seen_at: { type: string, format: date-time }
        last_seen_at: { type: string, format: date-time }
      additionalProperties: true
    ConditionVocabularyEntry:
      type: object
      properties:
        key: { type: string }
        label: { type: string }
        aliases:
          type: array
          items: { type: string }
      additionalProperties: true
    ManualCaptureTask:
      type: object
      description: A human-capture task (src/domain/monitoring).
      properties:
        id: { type: string, format: uuid }
        status: { type: string }
        reason: { type: string }
        source_url: { type: [string, 'null'], format: uri }
      additionalProperties: true
    Source:
      type: object
      description: A crawl source (src/domain/source). Only key fields enumerated.
      properties:
        id: { type: string, format: uuid }
        url: { type: string, format: uri }
        type:
          type: string
          enum: [provider, bundler, community, discovered, aggregator]
        tier: { type: integer, enum: [1, 2, 3, 4] }
        status:
          type: string
          enum: [active, pending_approval, disabled, rejected]
        reliability_score: { type: number, minimum: 0, maximum: 1 }
        registrable_domain: { type: [string, 'null'] }
        resolved_url: { type: [string, 'null'], format: uri }
        proposal_reason:
          type: [string, 'null']
          description: |
            Short "why this domain was proposed" rationale, set when the source was
            surfaced by the discovery/ingest proposal loop and shown on the
            promotion queue (ACR-15). Null for seed/manually-added sources.
      additionalProperties: true
    SourceReviewRecord:
      type: object
      properties:
        id: { type: string }
        source_id: { type: string, format: uuid }
        action: { type: string, enum: [approve, reject] }
        approver: { type: string }
        reason: { type: [string, 'null'] }
        decided_at: { type: string, format: date-time }
      additionalProperties: true

    # ── Request bodies (mirror the zod schemas in review-api.ts) ────────────
    # Auth/IAM Phase 5: NO body carries `approver` — the actor is the verified token email.
    ApproverBody:
      type: object
      description: |
        An empty body; the actor is the verified token email (no `approver` field). Any extra
        property a stale client sends is silently stripped by the zod boundary (not rejected).
    RejectBody:
      type: object
      properties:
        reason: { type: string }
    ApproveCandidateBody:
      type: object
      properties:
        affiliate_disclosure:
          type: boolean
          description: EU-Omnibus disclosure; omitted ⇒ defaults true (over-disclose) + flagged.
    EditCandidateBody:
      type: object
      required: [patch]
      properties:
        patch: { $ref: '#/components/schemas/CandidatePatch' }
    CandidatePatch:
      type: object
      description: |
        The exact allow-listed set of reviewer-editable fields (ACR-14) — the
        `PATCHABLE_FIELDS` enforced by the domain `applyCandidatePatch`
        (src/domain/rules/candidate-patch.ts). Every property is OPTIONAL (send only
        what changed). Any property NOT listed here (id, evidence_id, source_url,
        status, schema_version, confidence, grounding, verified_by/at, …) is rejected
        with 400 — identity / provenance / lifecycle are never editable. A price edit
        re-derives `true_cost_monthly` server-side; every changed path is tagged into
        the deal's `human_edited`.
      additionalProperties: false
      properties:
        price: { $ref: '#/components/schemas/Price' }
        true_cost_monthly:
          type: number
          minimum: 0
          description: Re-derived from `price` when price is also patched; an explicit value only sticks when price is untouched.
        country: { $ref: '#/components/schemas/Country' }
        route_type: { $ref: '#/components/schemas/RouteType' }
        headline: { type: string, minLength: 1 }
        eligibility: { $ref: '#/components/schemas/Eligibility' }
        validity: { $ref: '#/components/schemas/Validity' }
        included_items:
          type: array
          items: { type: string }
        attributes:
          type: object
          additionalProperties: true
    PromoteBody:
      type: object
      required: [canonical_key, label]
      properties:
        canonical_key: { type: string, minLength: 1 }
        label: { type: string, minLength: 1 }
        target:
          type: string
          enum: [vocabulary, field]
          default: vocabulary
          description: '`field` returns 400 (not supported).'
    CompleteManualBody:
      type: object
      required: [fields, evidence]
      properties:
        fields:
          type: object
          additionalProperties: true
          description: The human-entered deal fields.
        evidence:
          type: object
          required: [source_url, screenshot_ref, html_ref, terms_ref, terms_text]
          properties:
            source_url: { type: string, minLength: 1, format: uri }
            screenshot_ref: { type: string, minLength: 1 }
            html_ref: { type: string, minLength: 1 }
            terms_ref: { type: string, minLength: 1 }
            terms_text: { type: string, minLength: 1 }
